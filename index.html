<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生ゲーム AODAISHO.ver - 3D Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
:root {
  --neon-blue: #00f5ff;
  --cyber-purple: #b967db;
  --matrix-green: #39ff14;
  --sunset-orange: #ff6b35;
  --chrome-silver: #c0c0c0;
  --dark-bg: #0a0a1a;
  --card-bg: rgba(15, 15, 40, 0.92);
  --font-title: 'Noto Serif JP', serif;
  --font-body: 'Noto Sans JP', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-body);
  background: var(--dark-bg);
  color: #fff;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* UI OVERLAY */
#ui-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
}
#ui-overlay > * { pointer-events: auto; }

/* SCREENS */
.screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }

@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 60%{transform:scale(1.15) rotate(2deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes glowPulse { 0%,100%{text-shadow:0 0 10px var(--neon-blue), 0 0 30px var(--neon-blue)} 50%{text-shadow:0 0 20px var(--neon-blue), 0 0 60px var(--neon-blue), 0 0 80px var(--cyber-purple)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(1080deg);opacity:0} }
@keyframes neonFlicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1} 20%,24%,55%{opacity:0.4} }
@keyframes spinIn { from{transform:rotate(-180deg) scale(0);opacity:0} to{transform:rotate(0) scale(1);opacity:1} }

/* TITLE SCREEN */
#title-screen {
  background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 70%);
  text-align: center;
  animation: fadeIn 1s ease;
}
.title-logo {
  font-family: var(--font-title);
  font-size: 4rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--neon-blue), var(--cyber-purple), var(--matrix-green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: glowPulse 3s ease infinite;
  margin-bottom: 8px;
}
.title-sub {
  font-size: 1.8rem;
  color: var(--neon-blue);
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 4px;
}
.title-edition {
  font-size: 1rem;
  color: var(--cyber-purple);
  letter-spacing: 8px;
  margin-bottom: 50px;
  animation: neonFlicker 4s ease infinite;
}
.neon-btn {
  background: transparent;
  border: 2px solid var(--neon-blue);
  color: var(--neon-blue);
  font-size: 1.4rem;
  font-weight: 700;
  padding: 18px 60px;
  border-radius: 50px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all .3s;
  text-shadow: 0 0 10px var(--neon-blue);
  box-shadow: 0 0 15px rgba(0,245,255,0.3), inset 0 0 15px rgba(0,245,255,0.1);
}
.neon-btn:hover {
  background: rgba(0,245,255,0.15);
  box-shadow: 0 0 30px rgba(0,245,255,0.5), inset 0 0 30px rgba(0,245,255,0.2);
  transform: scale(1.05);
}
.neon-btn:active { transform: scale(0.98); }

/* COUNT/NAME SCREENS */
#count-screen, #name-screen {
  background: radial-gradient(ellipse at center, rgba(26,26,62,0.95) 0%, rgba(10,10,26,0.98) 70%);
}
.screen h2 {
  font-family: var(--font-title);
  font-size: 2rem;
  color: var(--neon-blue);
  margin-bottom: 30px;
  text-shadow: 0 0 20px rgba(0,245,255,0.5);
}
.count-btns { display:flex; gap:16px; margin-bottom:30px; }
.count-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2px solid var(--cyber-purple);
  background: rgba(185,103,219,0.1);
  color: var(--cyber-purple);
  font-size: 1.8rem;
  font-weight: 900;
  cursor: pointer;
  transition: all .3s;
}
.count-btn.selected {
  background: var(--cyber-purple);
  color: #fff;
  box-shadow: 0 0 25px rgba(185,103,219,0.6);
  transform: scale(1.15);
}
.count-btn:hover { transform: scale(1.1); border-color: var(--neon-blue); }

.name-inputs { display:flex; flex-direction:column; gap:14px; width:100%; max-width:420px; margin-bottom:28px; }
.name-row { display:flex; align-items:center; gap:12px; }
.name-row .p-dot { width:24px; height:24px; border-radius:50%; flex-shrink:0; box-shadow: 0 0 10px currentColor; }
.name-row input {
  flex:1; padding:12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: #fff;
  font-size: 1rem;
  font-family: var(--font-body);
  transition: border-color .3s;
}
.name-row input:focus { outline:none; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,245,255,0.3); }

/* GAME HUD */
#game-hud {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 20;
  pointer-events: none;
}
#game-hud.active { display: block; }
#game-hud > * { pointer-events: auto; }

.hud-top {
  position: absolute;
  top: 12px; left: 12px; right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.hud-card {
  flex: 1;
  min-width: 150px;
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all .3s;
}
.hud-card.active-turn {
  border-color: var(--neon-blue);
  box-shadow: 0 0 15px rgba(0,245,255,0.3);
}
.hud-card .hc-name { font-weight: 700; font-size: .85rem; margin-bottom: 3px; }
.hud-card .hc-stats { font-size: .7rem; color: rgba(255,255,255,0.7); line-height: 1.5; }
.hud-card .hc-item { font-size: .65rem; color: var(--cyber-purple); margin-top: 2px; }

.hud-bottom {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  padding: 12px 28px;
  border: 1px solid rgba(255,255,255,0.1);
}
.hud-turn-label {
  font-family: var(--font-title);
  font-size: 1rem;
  color: var(--neon-blue);
}
.dice-display {
  font-size: 2.5rem;
  font-weight: 900;
  min-width: 50px;
  text-align: center;
  color: var(--matrix-green);
  text-shadow: 0 0 15px var(--matrix-green);
}
.roll-btn {
  background: linear-gradient(135deg, var(--sunset-orange), #ff3d00);
  color: #fff;
  border: none;
  padding: 14px 32px;
  border-radius: 25px;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all .2s;
  box-shadow: 0 4px 15px rgba(255,107,53,0.4);
}
.roll-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 6px 25px rgba(255,107,53,0.6); }
.roll-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.item-btn {
  background: linear-gradient(135deg, var(--cyber-purple), #8e24aa);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.item-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* EVENT MODAL */
.event-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.event-overlay.show { display: flex; }
.event-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 40px 32px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  animation: popIn .5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,245,255,0.1);
}
.event-card .ev-emoji { font-size: 80px; margin-bottom: 16px; animation: float 2s ease infinite; }
.event-card .ev-title { font-family: var(--font-title); font-size: 1.5rem; font-weight: 900; margin-bottom: 12px; color: var(--neon-blue); }
.event-card .ev-desc { font-size: .95rem; line-height: 1.8; color: rgba(255,255,255,0.8); margin-bottom: 20px; }
.event-card .ev-effects { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.ev-badge { padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: .85rem; animation: slideUp .4s ease; }
.ev-badge.pos { background: rgba(57,255,20,0.15); color: var(--matrix-green); border: 1px solid rgba(57,255,20,0.3); }
.ev-badge.neg { background: rgba(255,107,53,0.15); color: var(--sunset-orange); border: 1px solid rgba(255,107,53,0.3); }
.ev-close-btn {
  background: linear-gradient(135deg, var(--neon-blue), var(--cyber-purple));
  color: #fff;
  border: none;
  padding: 12px 40px;
  border-radius: 25px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.ev-close-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,245,255,0.4); }

/* MINIGAME OVERLAY */
.minigame-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  z-index: 110;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.minigame-overlay.show { display: flex; }
.mg-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 40px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  animation: slideUp .4s ease;
}
.mg-card h3 { font-family: var(--font-title); font-size: 1.4rem; color: var(--neon-blue); margin-bottom: 12px; }
.mg-card p { color: rgba(255,255,255,0.7); margin-bottom: 16px; line-height: 1.6; }

.tap-area {
  width: 180px; height: 180px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sunset-orange), #ff3d00);
  color: #fff;
  font-size: 3rem;
  display: flex; align-items: center; justify-content: center;
  margin: 16px auto;
  cursor: pointer;
  user-select: none;
  transition: transform .08s;
  box-shadow: 0 0 30px rgba(255,107,53,0.4);
}
.tap-area:active { transform: scale(0.88); }
.tap-counter { font-size: 2rem; font-weight: 900; color: var(--matrix-green); margin: 10px 0; }
.tap-timer { font-size: 1.1rem; color: rgba(255,255,255,0.6); }

.janken-choices { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
.janken-btn {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  font-size: 2.5rem;
  cursor: pointer;
  transition: all .2s;
}
.janken-btn:hover { transform: scale(1.15); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0,245,255,0.3); }

.slot-machine { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
.slot-reel {
  width: 70px; height: 90px;
  border: 2px solid var(--cyber-purple);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem;
  background: rgba(185,103,219,0.1);
  transition: all .2s;
}
.slot-reel.stopped { border-color: var(--matrix-green); box-shadow: 0 0 15px rgba(57,255,20,0.3); }
.slot-stop-btn {
  background: linear-gradient(135deg, var(--cyber-purple), #6a1b9a);
  color: #fff;
  border: none;
  padding: 12px 30px;
  border-radius: 25px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 16px;
}

/* TURN TRANSITION */
.turn-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse, rgba(10,10,26,0.95), rgba(0,0,0,0.98));
  z-index: 90;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.turn-overlay.show { display: flex; }
.turn-overlay h2 { font-family: var(--font-title); font-size: 2.5rem; margin-bottom: 16px; animation: popIn .5s ease; }
.turn-overlay .countdown { font-size: 5rem; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 30px var(--neon-blue); }

/* ENDING */
#ending-screen {
  background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 70%);
}
#ending-screen h1 {
  font-family: var(--font-title);
  font-size: 2.5rem;
  background: linear-gradient(135deg, var(--neon-blue), var(--cyber-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 30px;
}
.ranking-list { list-style: none; width: 100%; max-width: 520px; }
.ranking-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  animation: slideUp .5s ease;
}
.ranking-item:first-child { border-color: rgba(255,215,0,0.5); background: rgba(255,215,0,0.08); box-shadow: 0 0 20px rgba(255,215,0,0.1); }
.ranking-item .rank { font-size: 2rem; }
.ranking-item .r-name { font-size: 1.1rem; font-weight: 700; flex: 1; }
.ranking-item .r-score { font-size: .85rem; color: rgba(255,255,255,0.6); }
.restart-btn { margin-top: 30px; }

/* CONFETTI */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  top: -10px;
  z-index: 200;
  animation: confettiFall 3s linear forwards;
  pointer-events: none;
}

/* SHAKING */
.shaking { animation: shake .5s ease; }

/* RESPONSIVE */
@media (max-width:768px) {
  .title-logo { font-size: 2.5rem; }
  .hud-card { min-width: 100px; padding: 8px 10px; }
  .hud-card .hc-name { font-size: .75rem; }
  .hud-bottom { padding: 10px 16px; gap: 10px; }
  .event-card { padding: 24px 20px; }
  .event-card .ev-emoji { font-size: 56px; }
}
</style>
</head>
<body>

<canvas id="three-canvas"></canvas>

<div id="ui-overlay">
  <!-- TITLE -->
  <div id="title-screen" class="screen active">
    <div class="title-logo">人生ゲーム</div>
    <div class="title-sub">AODAISHO.ver</div>
    <div class="title-edition">— 3D EDITION —</div>
    <button class="neon-btn" onclick="showScreen('count-screen')">🎮 GAME START</button>
  </div>

  <!-- COUNT -->
  <div id="count-screen" class="screen">
    <h2>何人でプレイする？</h2>
    <div class="count-btns">
      <button class="count-btn" onclick="selectCount(1)">1</button>
      <button class="count-btn" onclick="selectCount(2)">2</button>
      <button class="count-btn" onclick="selectCount(3)">3</button>
      <button class="count-btn" onclick="selectCount(4)">4</button>
    </div>
    <button class="neon-btn" id="count-next-btn" disabled onclick="showScreen('name-screen')">NEXT →</button>
  </div>

  <!-- NAME -->
  <div id="name-screen" class="screen">
    <h2>名前を入力</h2>
    <div class="name-inputs" id="name-inputs"></div>
    <button class="neon-btn" onclick="startGame()">START!</button>
  </div>

  <!-- ENDING -->
  <div id="ending-screen" class="screen">
    <h1>🏆 RESULT 🏆</h1>
    <ul class="ranking-list" id="ranking-list"></ul>
    <button class="neon-btn restart-btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<!-- GAME HUD (separate layer) -->
<div id="game-hud">
  <div class="hud-top" id="hud-top"></div>
  <div class="hud-bottom">
    <span class="hud-turn-label" id="hud-turn-label">Turn 1</span>
    <span class="dice-display" id="dice-display">?</span>
    <button class="roll-btn" id="roll-btn" onclick="rollDice()">🎲 ROLL</button>
    <button class="item-btn" id="item-btn" disabled onclick="useItem()">🎒</button>
  </div>
</div>

<!-- EVENT OVERLAY -->
<div class="event-overlay" id="event-overlay">
  <div class="event-card" id="event-card">
    <div class="ev-emoji" id="ev-emoji"></div>
    <div class="ev-title" id="ev-title"></div>
    <div class="ev-desc" id="ev-desc"></div>
    <div class="ev-effects" id="ev-effects"></div>
    <button class="ev-close-btn" onclick="closeEvent()">OK</button>
  </div>
</div>

<!-- MINIGAME -->
<div class="minigame-overlay" id="minigame-overlay">
  <div class="mg-card" id="mg-card"></div>
</div>

<!-- TURN TRANSITION -->
<div class="turn-overlay" id="turn-overlay">
  <h2 id="turn-text"></h2>
  <div class="countdown" id="turn-countdown"></div>
</div>

<script>
// ===== THREE.JS SETUP =====
let scene, camera, renderer, clock;
let boardTiles = [];
let playerMeshes = [];
let diceMesh = null;
let particleSystem = null;

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 28, 22);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  clock = new THREE.Clock();

  setupLighting();
  createEnvironment();
  createBoard3D();
  createFloatingParticles();

  window.addEventListener('resize', onResize);
  animate();
}

function setupLighting() {
  const ambient = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(15, 25, 15);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 1;
  dirLight.shadow.camera.far = 60;
  dirLight.shadow.camera.left = -30;
  dirLight.shadow.camera.right = 30;
  dirLight.shadow.camera.top = 30;
  dirLight.shadow.camera.bottom = -30;
  scene.add(dirLight);

  const neonLight1 = new THREE.PointLight(0x00f5ff, 0.8, 40);
  neonLight1.position.set(-10, 8, -10);
  scene.add(neonLight1);

  const neonLight2 = new THREE.PointLight(0xb967db, 0.6, 40);
  neonLight2.position.set(10, 8, 10);
  scene.add(neonLight2);

  const greenLight = new THREE.PointLight(0x39ff14, 0.4, 30);
  greenLight.position.set(0, 5, 0);
  scene.add(greenLight);
}

function createEnvironment() {
  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(80, 80);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x080818, roughness: 0.9, metalness: 0.1 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.5;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid lines
  const gridHelper = new THREE.GridHelper(60, 30, 0x1a1a3e, 0x1a1a3e);
  gridHelper.position.y = -0.49;
  scene.add(gridHelper);
}

function getTilePosition(index) {
  // Snake layout: 5 columns, alternating direction
  const row = Math.floor(index / 5);
  const colInRow = index % 5;
  const col = (row % 2 === 0) ? colInRow : (4 - colInRow);
  const x = (col - 2) * (TILE_SIZE + TILE_GAP);
  const z = (row - 2) * (TILE_SIZE + TILE_GAP);
  return new THREE.Vector3(x, 0, z);
}

function createBoard3D() {
  for (let i = 0; i < TOTAL_CELLS; i++) {
    const data = boardLayout[i];
    const pos = getTilePosition(i);

    // Tile mesh
    const geo = new THREE.BoxGeometry(TILE_SIZE, 0.4, TILE_SIZE);
    const mat = new THREE.MeshStandardMaterial({
      color: data.color,
      emissive: data.color,
      emissiveIntensity: 0.15,
      roughness: 0.4,
      metalness: 0.2,
      flatShading: true
    });
    const tile = new THREE.Mesh(geo, mat);
    tile.position.copy(pos);
    tile.castShadow = true;
    tile.receiveShadow = true;
    tile.userData = { index: i, type: data.type };
    scene.add(tile);
    boardTiles.push(tile);

    // Edge glow
    const edgeGeo = new THREE.BoxGeometry(TILE_SIZE + 0.1, 0.05, TILE_SIZE + 0.1);
    const edgeMat = new THREE.MeshBasicMaterial({ color: data.color, transparent: true, opacity: 0.3 });
    const edge = new THREE.Mesh(edgeGeo, edgeMat);
    edge.position.copy(pos);
    edge.position.y = -0.15;
    scene.add(edge);

    // Index number as small pillar
    if (data.type === 'start' || data.type === 'goal' || data.type === 'boss') {
      const pillarGeo = new THREE.CylinderGeometry(0.1, 0.15, 1.5, 6);
      const pillarMat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.5 });
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.copy(pos);
      pillar.position.y = 0.95;
      scene.add(pillar);
    }
  }
}

function createFloatingParticles() {
  const count = 200;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 60;
    positions[i * 3 + 1] = Math.random() * 20 + 2;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 60;

    const color = new THREE.Color();
    color.setHSL(Math.random() * 0.3 + 0.5, 0.8, 0.6);
    colors[i * 3] = color.r;
    colors[i * 3 + 1] = color.g;
    colors[i * 3 + 2] = color.b;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.6 });
  particleSystem = new THREE.Points(geo, mat);
  scene.add(particleSystem);
}

function createPlayerTokens() {
  playerMeshes = [];
  players.forEach((p, i) => {
    const group = new THREE.Group();

    // Body (low-poly cylinder)
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.9, 8);

    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);

    body.castShadow = true;
    group.add(body);

    // Head (dodecahedron)
    const headGeo = new THREE.DodecahedronGeometry(0.25, 0);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, flatShading: true, roughness: 0.7 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.35;
    head.castShadow = true;
    group.add(head);

    // Base glow ring
    const ringGeo = new THREE.RingGeometry(0.35, 0.55, 16);
    const ringMat = new THREE.MeshBasicMaterial({ color: PLAYER_COLORS_HEX[i], transparent: true, opacity: 0.6, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.21;
    group.add(ring);

    const startPos = getTilePosition(0);
    group.position.set(startPos.x + (i - 1.5) * 0.4, 0, startPos.z + (i < 2 ? -0.3 : 0.3));

    scene.add(group);
    playerMeshes.push(group);

    // Idle float animation
    gsap.to(group.position, { y: '+=0.15', duration: 1.5 + i * 0.2, ease: 'sine.inOut', yoyo: true, repeat: -1 });
  });
}

function moveToken3D(playerIndex, targetTileIndex) {
  return new Promise(resolve => {
    const token = playerMeshes[playerIndex];
    const targetPos = getTilePosition(targetTileIndex);
    // Offset to avoid overlap
    const offsetX = (playerIndex - 1.5) * 0.35;
    const offsetZ = (playerIndex < 2 ? -0.25 : 0.25);

    const tl = gsap.timeline({ onComplete: resolve });
    tl.to(token.position, { y: 2.5, duration: 0.3, ease: 'power2.out' });
    tl.to(token.position, { x: targetPos.x + offsetX, z: targetPos.z + offsetZ, duration: 0.5, ease: 'power2.inOut' }, '-=0.1');
    tl.to(token.position, { y: 0, duration: 0.4, ease: 'bounce.out' });
    tl.to(token.rotation, { y: '+=1', duration: 0.3, ease: 'power1.out' }, '-=0.4');

    // Glow the target tile
    const tile = boardTiles[targetTileIndex];
    if (tile) {
      gsap.to(tile.material, { emissiveIntensity: 0.8, duration: 0.3, yoyo: true, repeat: 1 });
      gsap.to(tile.position, { y: 0.2, duration: 0.2, yoyo: true, repeat: 1 });
    }
  });
}

// ===== 3D DICE =====
function createDice3D() {
  const geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
  const mats = [];
  const faceColors = [0xffffff, 0xffffff, 0xffffff, 0xffffff, 0xffffff, 0xffffff];
  faceColors.forEach(c => {
    mats.push(new THREE.MeshStandardMaterial({ color: c, roughness: 0.3, metalness: 0.1 }));
  });
  diceMesh = new THREE.Mesh(geo, mats);
  diceMesh.position.set(0, 15, 0);
  diceMesh.castShadow = true;
  diceMesh.visible = false;
  scene.add(diceMesh);
}

function animateDiceRoll(result) {
  return new Promise(resolve => {
    diceMesh.visible = true;
    diceMesh.position.set(0, 8, 0);

    const tl = gsap.timeline({ onComplete: () => { diceMesh.visible = false; resolve(); } });
    // Spin
    tl.to(diceMesh.rotation, { x: Math.PI * 4 + Math.random() * 2, y: Math.PI * 3 + Math.random() * 2, z: Math.PI * 2, duration: 1.5, ease: 'power3.out' });
    // Fall
    tl.to(diceMesh.position, { y: 1, duration: 1.2, ease: 'bounce.out' }, '<0.3');
    // Scale pop
    tl.to(diceMesh.scale, { x: 1.3, y: 1.3, z: 1.3, duration: 0.15, yoyo: true, repeat: 1 }, '-=0.3');
  });
}

// ===== ANIMATION LOOP =====
function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Rotate particles slowly
  if (particleSystem) {
    particleSystem.rotation.y = time * 0.02;
    const positions = particleSystem.geometry.attributes.position.array;
    for (let i = 1; i < positions.length; i += 3) {
      positions[i] += Math.sin(time + i) * 0.002;
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;
  }

  // Subtle tile animations
  boardTiles.forEach((tile, i) => {
    tile.position.y = Math.sin(time * 0.5 + i * 0.3) * 0.03;
  });

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

  players = [];

    const name = document.getElementById(`pname-${i}`).value.trim() || `P${i+1}`;

// ===== DICE ROLL =====
async function rollDice() {
  if (isRolling || gameEnded) return;
  isRolling = true;
  document.getElementById('roll-btn').disabled = true;
  const display = document.getElementById('dice-display');

  // Spinning numbers
  let count = 0;
  const spinInterval = setInterval(() => {
    display.textContent = Math.floor(Math.random() * 6) + 1;
    count++;
  }, 60);

  // 3D dice animation
  await animateDiceRoll();

  clearInterval(spinInterval);
  const result = Math.floor(Math.random() * 6) + 1;
  display.textContent = result;

  // Flash effect on display
  gsap.fromTo(display, { scale: 2, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(2)' });

  await movePlayer(result);
}

async function movePlayer(steps) {
  const p = players[currentPlayerIndex];
  const target = Math.min(p.position + steps, TOTAL_CELLS - 1);

  // Animate step by step
  for (let pos = p.position + 1; pos <= target; pos++) {
    await moveToken3D(currentPlayerIndex, pos);
    p.position = pos;
    await sleep(150);
  }

  if (target >= TOTAL_CELLS - 1) {
    p.finished = true;
    p.finishOrder = players.filter(pp => pp.finished).length;
    const bonuses = [60, 40, 20, 0];
    const bonus = bonuses[p.finishOrder - 1] || 0;
    p.contribution += bonus;
    spawnConfetti();
    showEventCard('🏁', `${p.name} ゴール！`, `${p.finishOrder}位でゴール！ 貢献度ボーナス +${bonus}`, { contribution: bonus });
  } else {
    triggerCellEvent(target);
  }
}

// ===== CELL EVENTS =====
function triggerCellEvent(position) {
  const cell = boardLayout[position];
  switch (cell.type) {
    case 'bonus': spawnConfetti(); triggerRandom(bonusEvents); break;
    case 'pinch': shakeScreen(); triggerPinch(); break;
    case 'fate': showSlotMachine(); break;
    case 'history': triggerRandom(historyEvents); break;
    case 'battle': triggerBattle(); break;
    case 'hell': flashRed(); triggerHell(); break;
    case 'boss': triggerRandom(bossEvents); break;
    default: endTurn(); break;
  }
}

function triggerRandom(eventList) {
  const ev = eventList[Math.floor(Math.random() * eventList.length)];
  applyEffects(ev.effects);
  showEventCard(ev.emoji, ev.title, ev.description, ev.effects);
}

function triggerPinch() {
  const p = players[currentPlayerIndex];
  if (p.shield) {
    p.shield = false;
    showEventCard('🛡️', '責任転嫁発動！', 'マイナスイベント完全回避！他部署のみなさんすみません！', {});
    return;
  }
  triggerRandom(pinchEvents);
}

function triggerHell() {
  const p = players[currentPlayerIndex];
  if (p.shield) {
    p.shield = false;
    showEventCard('🛡️', '責任転嫁発動！', '地獄のダメージを全回避！奇跡だ！', {});
    return;
  }
  triggerRandom(hellEvents);
}

function triggerBattle() {
  if (playerCount <= 1) { showTapChallenge(); return; }
  const opponents = players.filter((p, i) => i !== currentPlayerIndex && !p.finished);
  if (opponents.length === 0) { showTapChallenge(); return; }
  showJanken(opponents);
}

// ===== EFFECTS =====
function applyEffects(effects) {
  const p = players[currentPlayerIndex];
  if (effects.money) p.money = Math.max(0, p.money + effects.money);
  if (effects.motivation) p.motivation = Math.max(0, p.motivation + effects.motivation);
  if (effects.contribution) p.contribution = Math.max(0, p.contribution + effects.contribution);
}

// ===== EVENT CARD =====
function showEventCard(emoji, title, desc, effects) {
  document.getElementById('ev-emoji').textContent = emoji;
  document.getElementById('ev-title').textContent = title;
  document.getElementById('ev-desc').textContent = desc;
  const efDiv = document.getElementById('ev-effects');
  efDiv.innerHTML = '';
  if (effects.money) { efDiv.innerHTML += `<span class="ev-badge ${effects.money > 0 ? 'pos' : 'neg'}">💰 ${effects.money > 0 ? '+' : ''}${effects.money}</span>`; }
  if (effects.motivation) { efDiv.innerHTML += `<span class="ev-badge ${effects.motivation > 0 ? 'pos' : 'neg'}">❤️ ${effects.motivation > 0 ? '+' : ''}${effects.motivation}</span>`; }
  if (effects.contribution) { efDiv.innerHTML += `<span class="ev-badge ${effects.contribution > 0 ? 'pos' : 'neg'}">⭐ ${effects.contribution > 0 ? '+' : ''}${effects.contribution}</span>`; }
  document.getElementById('event-overlay').classList.add('show');
  renderHUD();
}

function closeEvent() {
  document.getElementById('event-overlay').classList.remove('show');
  if (players.every(p => p.finished)) { showEnding(); }
  else { endTurn(); }
}

// ===== ITEMS =====
function useItem() {
  const p = players[currentPlayerIndex];
  if (!p.item) return;
  switch (p.item) {
    case 'drink':
      p.money += 30; p.motivation += 30; p.contribution += 30;
      p.item = null;
      showEventCard('🥤', '社長の栄養ドリンク使用！', '全パラメータ+30！ 謎の味がするが効果は本物！', {money:30, motivation:30, contribution:30});
      break;
    case 'blame':
      p.shield = true; p.item = null;
      showEventCard('📋', '責任転嫁セット！', '次のマイナスイベントを自動回避！ 他部署ごめんなさい！', {});
      break;
    case 'meeting':
      players.forEach((pp, i) => { if (i !== currentPlayerIndex && !pp.finished) pp.position = p.position; });
      p.item = null;
      playerMeshes.forEach((m, i) => {
        if (i !== currentPlayerIndex && !players[i].finished) {
          const pos = getTilePosition(p.position);
          gsap.to(m.position, { x: pos.x + (i-1.5)*0.35, z: pos.z + (i<2?-0.25:0.25), y: 0, duration: 0.8, ease: 'power2.inOut' });
        }
      });
      showEventCard('📣', '緊急会議召集！', '全員がこのマスに強制召集！ 恐怖の会議パワー！', {});
      break;
  }
}

function maybeGiveItem() {
  const p = players[currentPlayerIndex];
  if (!p.item && Math.random() < 0.2) {
    p.item = ITEMS[Math.floor(Math.random() * ITEMS.length)].id;
  }
}

// ===== MINIGAMES =====

// SLOT MACHINE
function showSlotMachine() {
  const overlay = document.getElementById('minigame-overlay');
  const card = document.getElementById('mg-card');
  const symbols = ['🌟','😊','🙂','😐','😰','💀'];

  card.innerHTML = `
    <h3>🎰 運命のスロット</h3>
    <p>STOPで止めろ！ 最高の目を狙え！</p>
    <div class="slot-machine">
      <div class="slot-reel" id="sr0">${symbols[0]}</div>
      <div class="slot-reel" id="sr1">${symbols[0]}</div>
      <div class="slot-reel" id="sr2">${symbols[0]}</div>
    </div>
    <button class="slot-stop-btn" id="slot-btn" onclick="stopSlotReel()">STOP!</button>
  `;
  overlay.classList.add('show');

  const state = { stopped: [false,false,false], values: [0,0,0], current: 0, intervals: [] };
  for (let i = 0; i < 3; i++) {
    state.intervals[i] = setInterval(() => {
      if (state.stopped[i]) return;
      state.values[i] = Math.floor(Math.random() * symbols.length);
      document.getElementById(`sr${i}`).textContent = symbols[state.values[i]];
    }, 80 + i * 20);
  }
  window._slotState = { ...state, symbols };
}

function stopSlotReel() {
  const s = window._slotState;
  if (!s || s.current >= 3) return;
  s.stopped[s.current] = true;
  clearInterval(s.intervals[s.current]);
  document.getElementById(`sr${s.current}`).classList.add('stopped');
  s.current++;
  if (s.current >= 3) {
    document.getElementById('slot-btn').disabled = true;
    setTimeout(resolveSlot, 600);
  }
}

function resolveSlot() {
  const s = window._slotState;
  const best = Math.min(...s.values);
  const result = fateResults[best];
  applyEffects(result.effects);
  document.getElementById('minigame-overlay').classList.remove('show');
  if (best <= 1) spawnConfetti();
  showEventCard(result.emoji, result.title, result.description, result.effects);
}

// TAP CHALLENGE
function showTapChallenge() {
  const overlay = document.getElementById('minigame-overlay');
  const card = document.getElementById('mg-card');
  const target = 15 + Math.floor(Math.random() * 10);

  card.innerHTML = `
    <h3>👊 連打チャレンジ！</h3>
    <p>${target}回タップで成功！ 3秒以内！</p>
    <div class="tap-area" id="tap-area" onclick="doTap()">👊</div>
    <div class="tap-counter" id="tap-cnt">0 / ${target}</div>
    <div class="tap-timer" id="tap-tmr">準備中...</div>
  `;
  overlay.classList.add('show');

  window._tapState = { count: 0, target, started: false, ended: false };
  setTimeout(() => {
    if (window._tapState.ended) return;
    window._tapState.started = true;
    document.getElementById('tap-tmr').textContent = '3.0秒';
    let t = 3000;
    const timer = setInterval(() => {
      t -= 100;
      if (t <= 0 || window._tapState.ended) { clearInterval(timer); finishTap(); return; }
      document.getElementById('tap-tmr').textContent = (t/1000).toFixed(1) + '秒';
    }, 100);
  }, 800);
}

function doTap() {
  const s = window._tapState;
  if (!s || !s.started || s.ended) return;
  s.count++;
  document.getElementById('tap-cnt').textContent = `${s.count} / ${s.target}`;
  if (s.count >= s.target) { s.ended = true; finishTap(); }
}

function finishTap() {
  const s = window._tapState;
  if (!s) return;
  s.ended = true;
  const ok = s.count >= s.target;
  setTimeout(() => {
    document.getElementById('minigame-overlay').classList.remove('show');
    if (ok) {
      spawnConfetti();
      applyEffects({money:40, motivation:20, contribution:15});
      showEventCard('🎊', '連打成功！', `${s.count}回達成！ 指が光速を超えた！`, {money:40, motivation:20, contribution:15});
    } else {
      applyEffects({money:-20, motivation:-15, contribution:0});
      showEventCard('😵', '連打失敗...', `${s.count}/${s.target}回... 次こそは！`, {money:-20, motivation:-15, contribution:0});
    }
  }, 500);
}

// JANKEN
function showJanken(opponents) {
  const opp = opponents[Math.floor(Math.random() * opponents.length)];
  window._jankenOpp = opp;
  const overlay = document.getElementById('minigame-overlay');
  const card = document.getElementById('mg-card');
  card.innerHTML = `
    <h3>🆚 じゃんけん対決！</h3>
    <p><strong>${players[currentPlayerIndex].name}</strong> vs <strong>${opp.name}</strong></p>
    <div class="janken-choices">
      <button class="janken-btn" onclick="doJanken('rock')">✊</button>
      <button class="janken-btn" onclick="doJanken('scissors')">✌️</button>
      <button class="janken-btn" onclick="doJanken('paper')">🖐️</button>
    </div>
  `;
  overlay.classList.add('show');
}

function doJanken(choice) {
  const choices = ['rock','scissors','paper'];
  const emojis = {rock:'✊', scissors:'✌️', paper:'🖐️'};
  const oChoice = choices[Math.floor(Math.random() * 3)];
  let outcome;
  if (choice === oChoice) outcome = 'draw';
  else if ((choice==='rock'&&oChoice==='scissors')||(choice==='scissors'&&oChoice==='paper')||(choice==='paper'&&oChoice==='rock')) outcome = 'win';
  else outcome = 'lose';

  document.querySelectorAll('.janken-btn').forEach(b => b.disabled = true);
  setTimeout(() => {
    document.getElementById('minigame-overlay').classList.remove('show');
    if (outcome === 'win') {
      spawnConfetti();
      applyEffects({money:50, motivation:20, contribution:15});
      showEventCard('🎉', 'じゃんけん勝利！', `${window._jankenOpp.name}に完勝！`, {money:50, motivation:20, contribution:15});
    } else if (outcome === 'lose') {
      applyEffects({money:-30, motivation:-15, contribution:-5});
      showEventCard('😭', 'じゃんけん敗北...', `${window._jankenOpp.name}に負けた...`, {money:-30, motivation:-15, contribution:-5});
    } else {
      applyEffects({money:10, motivation:10, contribution:5});
      showEventCard('🤝', 'あいこ！', '引き分け！仲良しの証！', {money:10, motivation:10, contribution:5});
    }
  }, 1200);
}

// ===== VFX =====
function spawnConfetti() {
  const colors = ['#ff4757','#3742fa','#2ed573','#ffa502','#b967db','#00f5ff','#39ff14'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (Math.random() * 8 + 5) + 'px';
    p.style.height = (Math.random() * 8 + 5) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 2) + 's';
    p.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4500);
  }

  // 3D confetti burst in scene
  burstParticles3D();
}

function burstParticles3D() {
  const count = 30;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const p = players[currentPlayerIndex];
  const tilePos = getTilePosition(p.position);

  for (let i = 0; i < count; i++) {
    positions[i*3] = tilePos.x + (Math.random() - 0.5) * 2;
    positions[i*3+1] = 2 + Math.random() * 3;
    positions[i*3+2] = tilePos.z + (Math.random() - 0.5) * 2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffd700, size: 0.3, transparent: true });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);

  gsap.to(mat, { opacity: 0, size: 0, duration: 2, ease: 'power2.out', onComplete: () => scene.remove(pts) });
}

function shakeScreen() {
  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 500);
  // Camera shake
  const orig = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  gsap.to(camera.position, { x: '+=0.5', duration: 0.05, yoyo: true, repeat: 5, onComplete: () => { camera.position.set(orig.x, orig.y, orig.z); } });
}

function flashRed() {
  const flash = new THREE.PointLight(0xff0000, 3, 50);
  flash.position.set(0, 10, 0);
  scene.add(flash);
  gsap.to(flash, { intensity: 0, duration: 1, ease: 'power2.out', onComplete: () => scene.remove(flash) });
}

// ===== TURN MANAGEMENT =====
function endTurn() {
  maybeGiveItem();
  renderHUD();
  isRolling = false;

  let next = (currentPlayerIndex + 1) % playerCount;
  let loop = 0;
  while (players[next].finished && loop < playerCount) { next = (next + 1) % playerCount; loop++; }
  if (players.every(p => p.finished)) { showEnding(); return; }
  if (next <= currentPlayerIndex) turnNumber++;
  currentPlayerIndex = next;

  if (playerCount > 1) { showTurnTransition(); }
  else { updateControls(); renderHUD(); }
}

function showTurnTransition() {
  const overlay = document.getElementById('turn-overlay');
  const p = players[currentPlayerIndex];
  document.getElementById('turn-text').innerHTML = `<span style="color:${PLAYER_COLORS_CSS[currentPlayerIndex]}">${p.name}</span> のターン！`;
  overlay.classList.add('show');

  // Focus camera on next player
  const pos = getTilePosition(p.position);
  gsap.to(camera.position, { x: pos.x + 5, y: 15, z: pos.z + 12, duration: 1.5, ease: 'power2.inOut' });

  let c = 3;
  document.getElementById('turn-countdown').textContent = c;
  const timer = setInterval(() => {
    c--;
    if (c <= 0) {
      clearInterval(timer);
      overlay.classList.remove('show');
      gsap.to(camera.position, { x: 0, y: 22, z: 18, duration: 1, ease: 'power2.inOut' });
      updateControls();
      renderHUD();
    } else {
      document.getElementById('turn-countdown').textContent = c;
    }
  }, 1000);
}

// ===== ENDING =====
function showEnding() {
  gameEnded = true;
  document.getElementById('game-hud').classList.remove('active');
  showScreen('ending-screen');
  spawnConfetti();

  const sorted = [...players].sort((a,b) => (b.money+b.motivation+b.contribution) - (a.money+a.motivation+a.contribution));
  const medals = ['🥇','🥈','🥉','4️⃣'];
  const list = document.getElementById('ranking-list');
  list.innerHTML = '';
  sorted.forEach((p, i) => {
    const total = p.money + p.motivation + p.contribution;
    const item = document.createElement('li');
    item.className = 'ranking-item';
    item.style.animationDelay = `${i * 0.2}s`;
    const ci = players.indexOf(p);
    item.innerHTML = `<span class="rank">${medals[i]}</span><span class="r-name" style="color:${PLAYER_COLORS_CSS[ci]}">${p.name}</span><span class="r-score">💰${p.money} ❤️${p.motivation} ⭐${p.contribution} = ${total}pt</span>`;
    list.appendChild(item);
  });

  // Celebration camera
  gsap.to(camera.position, { x: 0, y: 30, z: 5, duration: 2, ease: 'power2.inOut' });
  gsap.to(camera.rotation, { x: -1.2, y: Math.PI * 2, duration: 4, ease: 'power1.inOut' });
}

// ===== UTILITIES =====
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ===== INIT =====
initThree();
</script>
