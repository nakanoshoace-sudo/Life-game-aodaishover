<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生ゲーム AODAISHO.ver - 3D Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
:root {
  --neon-blue: #00f5ff;
  --cyber-purple: #b967db;
  --matrix-green: #39ff14;
  --sunset-orange: #ff6b35;
  --chrome-silver: #c0c0c0;
  --dark-bg: #0a0a1a;
  --card-bg: rgba(15, 15, 40, 0.92);
  --font-title: 'Noto Serif JP', serif;
  --font-body: 'Noto Sans JP', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-body); background:var(--dark-bg); color:#fff; overflow:hidden; width:100vw; height:100vh; }
#three-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
#ui-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none; }
#ui-overlay > * { pointer-events:auto; }
.screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }

@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 60%{transform:scale(1.15) rotate(2deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes glowPulse { 0%,100%{text-shadow:0 0 10px var(--neon-blue),0 0 30px var(--neon-blue)} 50%{text-shadow:0 0 20px var(--neon-blue),0 0 60px var(--neon-blue),0 0 80px var(--cyber-purple)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(1080deg);opacity:0} }
@keyframes neonFlicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1} 20%,24%,55%{opacity:0.4} }
@keyframes spinIn { from{transform:rotate(-180deg) scale(0);opacity:0} to{transform:rotate(0) scale(1);opacity:1} }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 10px currentColor} 50%{box-shadow:0 0 30px currentColor,0 0 60px currentColor} }
@keyframes charFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

/* TITLE */
#title-screen { background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 70%); text-align:center; animation:fadeIn 1s ease; }
.title-logo { font-family:var(--font-title); font-size:4rem; font-weight:900; background:linear-gradient(135deg,var(--neon-blue),var(--cyber-purple),var(--matrix-green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:glowPulse 3s ease infinite; margin-bottom:8px; }
.title-sub { font-size:1.8rem; color:var(--neon-blue); font-weight:700; letter-spacing:4px; margin-bottom:4px; }
.title-edition { font-size:1rem; color:var(--cyber-purple); letter-spacing:8px; margin-bottom:50px; animation:neonFlicker 4s ease infinite; }
.neon-btn { background:transparent; border:2px solid var(--neon-blue); color:var(--neon-blue); font-size:1.4rem; font-weight:700; padding:18px 60px; border-radius:50px; cursor:pointer; font-family:var(--font-body); transition:all .3s; text-shadow:0 0 10px var(--neon-blue); box-shadow:0 0 15px rgba(0,245,255,0.3),inset 0 0 15px rgba(0,245,255,0.1); }
.neon-btn:hover { background:rgba(0,245,255,0.15); box-shadow:0 0 30px rgba(0,245,255,0.5),inset 0 0 30px rgba(0,245,255,0.2); transform:scale(1.05); }
.neon-btn:active { transform:scale(0.98); }
.neon-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

/* COUNT/NAME */
#count-screen,#name-screen { background:radial-gradient(ellipse at center,rgba(26,26,62,0.95) 0%,rgba(10,10,26,0.98) 70%); }
.screen h2 { font-family:var(--font-title); font-size:2rem; color:var(--neon-blue); margin-bottom:30px; text-shadow:0 0 20px rgba(0,245,255,0.5); }
.count-btns { display:flex; gap:16px; margin-bottom:30px; }
.count-btn { width:72px; height:72px; border-radius:50%; border:2px solid var(--cyber-purple); background:rgba(185,103,219,0.1); color:var(--cyber-purple); font-size:1.8rem; font-weight:900; cursor:pointer; transition:all .3s; }
.count-btn.selected { background:var(--cyber-purple); color:#fff; box-shadow:0 0 25px rgba(185,103,219,0.6); transform:scale(1.15); }
.count-btn:hover { transform:scale(1.1); }
.name-inputs { display:flex; flex-direction:column; gap:14px; width:100%; max-width:420px; margin-bottom:28px; }
.name-row { display:flex; align-items:center; gap:12px; }
.name-row .p-dot { width:24px; height:24px; border-radius:50%; flex-shrink:0; }
.name-row input { flex:1; padding:12px 16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.2); border-radius:12px; color:#fff; font-size:1rem; font-family:var(--font-body); transition:border-color .3s; }
.name-row input:focus { outline:none; border-color:var(--neon-blue); box-shadow:0 0 10px rgba(0,245,255,0.3); }

/* ===== CHARACTER SELECT SCREEN ===== */
#char-screen { background:radial-gradient(ellipse at center,rgba(15,15,40,0.97) 0%,rgba(5,5,15,0.99) 70%); }
.char-header { position:absolute; top:20px; left:0; right:0; text-align:center; z-index:5; }
.char-header h2 { font-family:var(--font-title); font-size:1.6rem; color:var(--neon-blue); margin-bottom:6px; }
.char-header .char-player-label { font-size:1.1rem; color:var(--cyber-purple); font-weight:700; }
.char-selected-list { display:flex; gap:8px; justify-content:center; margin-top:8px; }
.char-selected-badge { padding:4px 12px; border-radius:12px; font-size:.7rem; font-weight:700; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); }

.char-stage-area { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
#char-canvas { width:100%; height:100%; }

.char-nav { position:absolute; top:50%; transform:translateY(-50%); width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); color:#fff; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; z-index:5; backdrop-filter:blur(5px); }
.char-nav:hover { background:rgba(0,245,255,0.2); border-color:var(--neon-blue); }
.char-nav.left { left:16px; }
.char-nav.right { right:16px; }

.char-info-panel { position:absolute; bottom:0; left:0; right:0; padding:20px 24px 30px; background:linear-gradient(to top,rgba(5,5,15,0.98) 0%,rgba(5,5,15,0.8) 70%,transparent 100%); z-index:5; text-align:center; transition:all .4s; }
.char-info-panel .char-name { font-family:var(--font-title); font-size:1.8rem; font-weight:900; margin-bottom:4px; transition:color .3s; }
.char-info-panel .char-role { font-size:.9rem; color:rgba(255,255,255,0.6); margin-bottom:10px; }
.char-info-panel .char-skill-box { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:14px; padding:12px 16px; margin-bottom:16px; text-align:left; }
.char-info-panel .char-skill-name { font-size:.9rem; font-weight:700; color:var(--matrix-green); margin-bottom:4px; }
.char-info-panel .char-skill-desc { font-size:.8rem; color:rgba(255,255,255,0.7); line-height:1.5; }
.char-info-panel .char-stats { display:flex; gap:12px; justify-content:center; margin-bottom:16px; }
.char-stat { text-align:center; }
.char-stat .stat-val { font-size:1.3rem; font-weight:900; }
.char-stat .stat-label { font-size:.6rem; color:rgba(255,255,255,0.5); }
.char-select-btn { width:100%; max-width:320px; padding:14px; border:none; border-radius:25px; font-size:1.1rem; font-weight:800; color:#fff; cursor:pointer; transition:all .2s; font-family:var(--font-body); }
.char-select-btn:hover { transform:scale(1.03); filter:brightness(1.2); }

/* GAME HUD */
#game-hud { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:20; pointer-events:none; }
#game-hud.active { display:block; }
#game-hud > * { pointer-events:auto; }
.hud-top { position:absolute; top:12px; left:12px; right:12px; display:flex; gap:8px; flex-wrap:wrap; }
.hud-card { flex:1; min-width:140px; background:var(--card-bg); backdrop-filter:blur(10px); border-radius:14px; padding:10px 14px; border:1px solid rgba(255,255,255,0.1); transition:all .3s; }
.hud-card.active-turn { border-color:var(--neon-blue); box-shadow:0 0 15px rgba(0,245,255,0.3); }
.hud-card .hc-name { font-weight:700; font-size:.85rem; margin-bottom:3px; }
.hud-card .hc-stats { font-size:.7rem; color:rgba(255,255,255,0.7); line-height:1.5; }
.hud-card .hc-item { font-size:.65rem; color:var(--cyber-purple); margin-top:2px; }
.hud-bottom { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:16px; background:var(--card-bg); backdrop-filter:blur(10px); border-radius:30px; padding:12px 28px; border:1px solid rgba(255,255,255,0.1); }
.hud-turn-label { font-family:var(--font-title); font-size:1rem; color:var(--neon-blue); }
.dice-display { font-size:2.5rem; font-weight:900; min-width:50px; text-align:center; color:var(--matrix-green); text-shadow:0 0 15px var(--matrix-green); }
.roll-btn { background:linear-gradient(135deg,var(--sunset-orange),#ff3d00); color:#fff; border:none; padding:14px 32px; border-radius:25px; font-size:1.1rem; font-weight:800; cursor:pointer; font-family:var(--font-body); transition:all .2s; box-shadow:0 4px 15px rgba(255,107,53,0.4); }
.roll-btn:hover:not(:disabled) { transform:scale(1.06); box-shadow:0 6px 25px rgba(255,107,53,0.6); }
.roll-btn:disabled { opacity:0.4; cursor:not-allowed; }
.item-btn { background:linear-gradient(135deg,var(--cyber-purple),#8e24aa); color:#fff; border:none; padding:10px 20px; border-radius:20px; font-size:.85rem; font-weight:700; cursor:pointer; transition:all .2s; }
.item-btn:disabled { opacity:0.35; cursor:not-allowed; }

/* EVENT MODAL */
.event-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); z-index:100; align-items:center; justify-content:center; padding:20px; }
.event-overlay.show { display:flex; }
.event-card { background:var(--card-bg); border:1px solid rgba(255,255,255,0.15); border-radius:24px; padding:40px 32px; max-width:520px; width:100%; text-align:center; animation:popIn .5s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(0,245,255,0.1); }
.event-card .ev-emoji { font-size:80px; margin-bottom:16px; animation:float 2s ease infinite; }
.event-card .ev-title { font-family:var(--font-title); font-size:1.5rem; font-weight:900; margin-bottom:12px; color:var(--neon-blue); }
.event-card .ev-desc { font-size:.95rem; line-height:1.8; color:rgba(255,255,255,0.8); margin-bottom:20px; }
.event-card .ev-effects { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
.ev-badge { padding:6px 14px; border-radius:20px; font-weight:700; font-size:.85rem; animation:slideUp .4s ease; }
.ev-badge.pos { background:rgba(57,255,20,0.15); color:var(--matrix-green); border:1px solid rgba(57,255,20,0.3); }
.ev-badge.neg { background:rgba(255,107,53,0.15); color:var(--sunset-orange); border:1px solid rgba(255,107,53,0.3); }
.ev-close-btn { background:linear-gradient(135deg,var(--neon-blue),var(--cyber-purple)); color:#fff; border:none; padding:12px 40px; border-radius:25px; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; }
.ev-close-btn:hover { transform:scale(1.05); box-shadow:0 0 20px rgba(0,245,255,0.4); }

/* MINIGAME */
.minigame-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:110; align-items:center; justify-content:center; padding:20px; }
.minigame-overlay.show { display:flex; }
.mg-card { background:var(--card-bg); border:1px solid rgba(255,255,255,0.15); border-radius:24px; padding:40px; max-width:520px; width:100%; text-align:center; animation:slideUp .4s ease; }
.mg-card h3 { font-family:var(--font-title); font-size:1.4rem; color:var(--neon-blue); margin-bottom:12px; }
.mg-card p { color:rgba(255,255,255,0.7); margin-bottom:16px; line-height:1.6; }
.tap-area { width:180px; height:180px; border-radius:50%; background:linear-gradient(135deg,var(--sunset-orange),#ff3d00); color:#fff; font-size:3rem; display:flex; align-items:center; justify-content:center; margin:16px auto; cursor:pointer; user-select:none; transition:transform .08s; box-shadow:0 0 30px rgba(255,107,53,0.4); }
.tap-area:active { transform:scale(0.88); }
.tap-counter { font-size:2rem; font-weight:900; color:var(--matrix-green); margin:10px 0; }
.tap-timer { font-size:1.1rem; color:rgba(255,255,255,0.6); }
.janken-choices { display:flex; gap:16px; justify-content:center; margin:20px 0; }
.janken-btn { width:80px; height:80px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); font-size:2.5rem; cursor:pointer; transition:all .2s; }
.janken-btn:hover { transform:scale(1.15); border-color:var(--neon-blue); box-shadow:0 0 20px rgba(0,245,255,0.3); }
.slot-machine { display:flex; gap:10px; justify-content:center; margin:20px 0; }
.slot-reel { width:70px; height:90px; border:2px solid var(--cyber-purple); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; background:rgba(185,103,219,0.1); transition:all .2s; }
.slot-reel.stopped { border-color:var(--matrix-green); box-shadow:0 0 15px rgba(57,255,20,0.3); }
.slot-stop-btn { background:linear-gradient(135deg,var(--cyber-purple),#6a1b9a); color:#fff; border:none; padding:12px 30px; border-radius:25px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:16px; }

/* TURN TRANSITION */
.turn-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse,rgba(10,10,26,0.95),rgba(0,0,0,0.98)); z-index:90; align-items:center; justify-content:center; flex-direction:column; }
.turn-overlay.show { display:flex; }
.turn-overlay h2 { font-family:var(--font-title); font-size:2.5rem; margin-bottom:16px; animation:popIn .5s ease; }
.turn-overlay .countdown { font-size:5rem; font-weight:900; color:var(--neon-blue); text-shadow:0 0 30px var(--neon-blue); }

/* ENDING */
#ending-screen { background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 70%); }
#ending-screen h1 { font-family:var(--font-title); font-size:2.5rem; background:linear-gradient(135deg,var(--neon-blue),var(--cyber-purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:30px; }
.ranking-list { list-style:none; width:100%; max-width:520px; }
.ranking-item { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:16px 20px; margin-bottom:12px; display:flex; align-items:center; gap:16px; animation:slideUp .5s ease; }
.ranking-item:first-child { border-color:rgba(255,215,0,0.5); background:rgba(255,215,0,0.08); }
.ranking-item .rank { font-size:2rem; }
.ranking-item .r-name { font-size:1.1rem; font-weight:700; flex:1; }
.ranking-item .r-score { font-size:.85rem; color:rgba(255,255,255,0.6); }
.restart-btn { margin-top:30px; }
.confetti-piece { position:fixed; width:10px; height:10px; top:-10px; z-index:200; animation:confettiFall 3s linear forwards; pointer-events:none; }
.shaking { animation:shake .5s ease; }

@media (max-width:768px) {
  .title-logo { font-size:2.5rem; }
  .hud-card { min-width:100px; padding:8px 10px; }
  .hud-bottom { padding:10px 16px; gap:10px; }
  .char-info-panel .char-name { font-size:1.4rem; }
  .char-nav { width:40px; height:40px; font-size:1.2rem; }
}
</style>
</head>
<body>

<canvas id="three-canvas"></canvas>

<div id="ui-overlay">
  <!-- TITLE -->
  <div id="title-screen" class="screen active">
    <div class="title-logo">人生ゲーム</div>
    <div class="title-sub">AODAISHO.ver</div>
    <div class="title-edition">-- 3D EDITION --</div>
    <button class="neon-btn" onclick="showScreen('count-screen')">GAME START</button>
  </div>

  <!-- COUNT -->
  <div id="count-screen" class="screen">
    <h2>何人でプレイする？</h2>
    <div class="count-btns">
      <button class="count-btn" onclick="selectCount(1)">1</button>
      <button class="count-btn" onclick="selectCount(2)">2</button>
      <button class="count-btn" onclick="selectCount(3)">3</button>
      <button class="count-btn" onclick="selectCount(4)">4</button>
    </div>
    <button class="neon-btn" id="count-next-btn" disabled onclick="showScreen('name-screen')">NEXT</button>
  </div>

  <!-- NAME -->
  <div id="name-screen" class="screen">
    <h2>名前を入力</h2>
    <div class="name-inputs" id="name-inputs"></div>
    <button class="neon-btn" onclick="goToCharSelect()">キャラ選択へ</button>
  </div>

  <!-- CHARACTER SELECT -->
  <div id="char-screen" class="screen">
    <div class="char-header">
      <h2>キャラクター選択</h2>
      <div class="char-player-label" id="char-player-label">P1 が選んでいます...</div>
      <div class="char-selected-list" id="char-selected-list"></div>
    </div>
    <button class="char-nav left" onclick="rotateChars(-1)">&larr;</button>
    <button class="char-nav right" onclick="rotateChars(1)">&rarr;</button>
    <div class="char-info-panel" id="char-info-panel">
      <div class="char-name" id="ci-name"></div>
      <div class="char-role" id="ci-role"></div>
      <div class="char-skill-box">
        <div class="char-skill-name" id="ci-skill-name"></div>
        <div class="char-skill-desc" id="ci-skill-desc"></div>
      </div>
      <div class="char-stats" id="ci-stats"></div>
      <button class="char-select-btn" id="ci-btn" onclick="confirmCharacter()">このキャラで決定！</button>
    </div>
  </div>

  <!-- ENDING -->
  <div id="ending-screen" class="screen">
    <h1>RESULT</h1>
    <ul class="ranking-list" id="ranking-list"></ul>
    <button class="neon-btn restart-btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<!-- GAME HUD -->
<div id="game-hud">
  <div class="hud-top" id="hud-top"></div>
  <div class="hud-bottom">
    <span class="hud-turn-label" id="hud-turn-label">Turn 1</span>
    <span class="dice-display" id="dice-display">?</span>
    <button class="roll-btn" id="roll-btn" onclick="rollDice()">ROLL</button>
    <button class="item-btn" id="item-btn" disabled onclick="useItem()">ITEM</button>
  </div>
</div>

<!-- EVENT OVERLAY -->
<div class="event-overlay" id="event-overlay">
  <div class="event-card" id="event-card">
    <div class="ev-emoji" id="ev-emoji"></div>
    <div class="ev-title" id="ev-title"></div>
    <div class="ev-desc" id="ev-desc"></div>
    <div class="ev-effects" id="ev-effects"></div>
    <button class="ev-close-btn" onclick="closeEvent()">OK</button>
  </div>
</div>

<!-- MINIGAME -->
<div class="minigame-overlay" id="minigame-overlay">
  <div class="mg-card" id="mg-card"></div>
</div>

<!-- TURN TRANSITION -->
<div class="turn-overlay" id="turn-overlay">
  <h2 id="turn-text"></h2>
  <div class="countdown" id="turn-countdown"></div>
</div>

<script>
// ===== CHARACTER DATA =====
const CHARACTERS = [
  {
    id:'D', name:'男性D', role:'戦略コンサルタント',
    color:'#1a237e', colorHex:0x1a237e,
    look:'ネイビースーツ+眼鏡',
    skillName:'戦略的予見',
    skillDesc:'選択イベントの結果を事前に確認できる。情報を制する者がゲームを制す。',
    stats:{attack:3, defense:4, luck:2, charisma:4},
    effect:'formula' // 数式浮遊
  },
  {
    id:'S', name:'男性S', role:'フルスタックエンジニア',
    color:'#1b5e20', colorHex:0x1b5e20,

function getTilePosition(index) {
  const row = Math.floor(index / 5);
  const colInRow = index % 5;
  const col = (row % 2 === 0) ? colInRow : (4 - colInRow);
  return new THREE.Vector3((col - 2) * (TILE_SIZE + TILE_GAP), 0, (row - 2) * (TILE_SIZE + TILE_GAP));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

function selectCount(n) {
  playerCount = n;
  document.querySelectorAll('.count-btn').forEach((b,i) => b.classList.toggle('selected', i === n-1));

function buildNameInputs() {

function initCharSelect3D() {
  // Use main scene for character select with different camera
  // Clear existing objects first time
  if (charStage) return; // already initialized

  // Create circular stage
  const stageGeo = new THREE.CylinderGeometry(5, 5.5, 0.5, 32);
  const stageMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a3e,
    emissive: 0x00f5ff,
    emissiveIntensity: 0.15,
    metalness: 0.8,
    roughness: 0.2
  });
  charStage = new THREE.Mesh(stageGeo, stageMat);
  charStage.position.y = -1;
  charStage.receiveShadow = true;
  scene.add(charStage);

  // Stage edge glow ring
  const ringGeo = new THREE.TorusGeometry(5.2, 0.08, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({color: 0x00f5ff, transparent: true, opacity: 0.6});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = -0.7;
  scene.add(ring);

  // Create character sprites in a circle
  createCharacterSprites();

  // Move camera for character select view
  gsap.to(camera.position, {x: 0, y: 5, z: 12, duration: 1.5, ease: 'power3.inOut'});
  gsap.to(camera.rotation, {x: -0.25, y: 0, z: 0, duration: 1.5, ease: 'power3.inOut'});
}

function createCharacterSprites() {
  charSprites.forEach(s => scene.remove(s));
  charSprites = [];

  const availableChars = CHARACTERS.filter(c => !players.some(p => p.character && p.character.id === c.id));

  availableChars.forEach((charData, i) => {
    const totalAvail = availableChars.length;
    const angle = (i / totalAvail) * Math.PI * 2 + charRotationTarget;
    const radius = 3.5;
    const x = Math.sin(angle) * radius;
    const z = Math.cos(angle) * radius;

    // Create billboard sprite using canvas texture
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 340;
    const ctx = canvas.getContext('2d');

    // Draw character on canvas
    drawCharacter(ctx, charData, 256, 340);

    const texture = new THREE.CanvasTexture(canvas);
    texture.magFilter = THREE.LinearFilter;
    texture.minFilter = THREE.LinearFilter;

    const mat = new THREE.MeshBasicMaterial({map: texture, transparent: true, side: THREE.DoubleSide, alphaTest: 0.1});
    const geo = new THREE.PlaneGeometry(2.5, 3.3);
    const sprite = new THREE.Mesh(geo, mat);
    sprite.position.set(x, 1.2, z);
    sprite.userData = {charData, index: i};

    scene.add(sprite);
    charSprites.push(sprite);

    // Idle float animation
    gsap.to(sprite.position, {y: 1.4, duration: 1.5 + i * 0.2, ease: 'sine.inOut', yoyo: true, repeat: -1});
  });
}

function drawCharacter(ctx, charData, w, h) {
  ctx.clearRect(0, 0, w, h);

  // Body silhouette
  const color = charData.color;
  ctx.fillStyle = color;

  // Head
  ctx.beginPath();
  ctx.arc(w/2, 80, 40, 0, Math.PI * 2);
  ctx.fill();

  // Face details
  ctx.fillStyle = '#ffcc99';
  ctx.beginPath();
  ctx.arc(w/2, 78, 34, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(w/2 - 12, 74, 4, 0, Math.PI * 2);
  ctx.arc(w/2 + 12, 74, 4, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(w/2, 90, 8, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();

  // Hair
  ctx.fillStyle = charData.id === 'A' ? '#4a2c2a' : charData.id === 'K' ? '#2c1810' : charData.id === 'H' ? '#1a1a1a' : '#1a1a2e';
  ctx.beginPath();
  if (charData.id === 'D' || charData.id === 'S') {
    // Short hair
    ctx.ellipse(w/2, 60, 38, 30, 0, Math.PI, 0);
    ctx.fill();
  } else {
    // Long hair
    ctx.ellipse(w/2, 62, 40, 32, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(w/2 - 38, 62, 12, 50);
    ctx.fillRect(w/2 + 26, 62, 12, 50);
  }

  // Glasses for D
  if (charData.id === 'D') {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.strokeRect(w/2 - 22, 68, 18, 14);
    ctx.strokeRect(w/2 + 4, 68, 18, 14);
    ctx.beginPath();
    ctx.moveTo(w/2 - 4, 75);
    ctx.lineTo(w/2 + 4, 75);
    ctx.stroke();
  }

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(w/2 - 35, 120);
  ctx.lineTo(w/2 + 35, 120);
  ctx.lineTo(w/2 + 40, 260);
  ctx.lineTo(w/2 - 40, 260);
  ctx.closePath();
  ctx.fill();

  // Suit/clothing details
  if (charData.id === 'D' || charData.id === 'H') {
    // Suit lapels
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(w/2, 120);
    ctx.lineTo(w/2 - 15, 180);
    ctx.moveTo(w/2, 120);
    ctx.lineTo(w/2 + 15, 180);
    ctx.stroke();
  }
  if (charData.id === 'S') {
    // Hoodie strings
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(w/2 - 8, 120);
    ctx.lineTo(w/2 - 10, 160);
    ctx.moveTo(w/2 + 8, 120);
    ctx.lineTo(w/2 + 10, 160);
    ctx.stroke();
  }
  if (charData.id === 'A') {
    // Phone in hand
    ctx.fillStyle = '#333';
    ctx.fillRect(w/2 + 25, 170, 12, 22);
    ctx.fillStyle = '#4fc3f7';
    ctx.fillRect(w/2 + 27, 172, 8, 16);
  }
  if (charData.id === 'K') {
    // Cardigan open
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(w/2 - 10, 125);
    ctx.lineTo(w/2 - 12, 250);
    ctx.moveTo(w/2 + 10, 125);
    ctx.lineTo(w/2 + 12, 250);
    ctx.stroke();
  }
  if (charData.id === 'H') {
    // Clipboard
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(w/2 - 45, 160, 20, 28);
    ctx.fillStyle = '#fff';
    ctx.fillRect(w/2 - 43, 164, 16, 20);
  }

  // Legs
  ctx.fillStyle = charData.id === 'A' || charData.id === 'K' ? '#2c2c2c' : color;
  ctx.fillRect(w/2 - 20, 260, 16, 50);
  ctx.fillRect(w/2 + 4, 260, 16, 50);

  // Shoes
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(w/2 - 22, 305, 20, 10);
  ctx.fillRect(w/2 + 2, 305, 20, 10);

  // Character label
  ctx.fillStyle = color;
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(charData.name, w/2, 335);
}

function rotateChars(dir) {
  const availableChars = CHARACTERS.filter(c => !players.some(p => p.character && p.character.id === c.id));
  if (availableChars.length === 0) return;
  charCurrentIndex = (charCurrentIndex + dir + availableChars.length) % availableChars.length;
  charRotationTarget -= dir * (Math.PI * 2 / availableChars.length);

  // Animate rotation
  charSprites.forEach((sprite, i) => {
    const totalAvail = availableChars.length;
    const angle = (i / totalAvail) * Math.PI * 2 + charRotationTarget;
    const radius = 3.5;
    const x = Math.sin(angle) * radius;
    const z = Math.cos(angle) * radius;
    gsap.to(sprite.position, {x, z, duration: 0.5, ease: 'power2.out'});
  });

  updateCharUI();
}

function updateCharUI() {
  const availableChars = CHARACTERS.filter(c => !players.some(p => p.character && p.character.id === c.id));
  if (availableChars.length === 0) return;

  const charData = availableChars[charCurrentIndex % availableChars.length];
  document.getElementById('ci-name').textContent = charData.name;
  document.getElementById('ci-name').style.color = charData.color;
  document.getElementById('ci-role').textContent = `${charData.look} / ${charData.role}`;
  document.getElementById('ci-skill-name').textContent = charData.skillName;
  document.getElementById('ci-skill-desc').textContent = charData.skillDesc;

  const statsDiv = document.getElementById('ci-stats');
  const statLabels = {attack:'攻撃', defense:'防御', luck:'運', charisma:'魅力'};
  statsDiv.innerHTML = Object.entries(charData.stats).map(([k,v]) =>
    `<div class="char-stat"><div class="stat-val" style="color:${charData.color}">${'★'.repeat(v)}${'☆'.repeat(5-v)}</div><div class="stat-label">${statLabels[k]}</div></div>`
  ).join('');

  const btn = document.getElementById('ci-btn');
  btn.style.background = `linear-gradient(135deg, ${charData.color}, ${lightenColor(charData.color, 30)})`;
  btn.textContent = `${charData.name} で決定！`;

  // Player label
  document.getElementById('char-player-label').textContent = `${players[charSelectingPlayer].name} が選んでいます...`;
  document.getElementById('char-player-label').style.color = PLAYER_COLORS_CSS[charSelectingPlayer];

  // Selected list
  const listDiv = document.getElementById('char-selected-list');
  listDiv.innerHTML = players.filter(p => p.character).map(p =>
    `<span class="char-selected-badge" style="border-color:${p.character.color};color:${p.character.color}">${p.name}: ${p.character.name}</span>`
  ).join('');

  // Billboard: make front character face camera
  charSprites.forEach((sprite, i) => {
    sprite.lookAt(camera.position);
    const isFront = i === (charCurrentIndex % availableChars.length);
    gsap.to(sprite.scale, {x: isFront ? 1.2 : 0.85, y: isFront ? 1.2 : 0.85, duration: 0.3});
    sprite.material.opacity = isFront ? 1.0 : 0.5;
  });
}

function confirmCharacter() {
  const availableChars = CHARACTERS.filter(c => !players.some(p => p.character && p.character.id === c.id));
  const charData = availableChars[charCurrentIndex % availableChars.length];

  players[charSelectingPlayer].character = charData;

  // Play selection effect
  playSelectEffect(charData);

  charSelectingPlayer++;
  if (charSelectingPlayer >= playerCount) {
    // All selected, start game
    setTimeout(() => {
      cleanupCharSelect();
      startGame();
    }, 1500);
  } else {
    // Next player
    setTimeout(() => {
      charCurrentIndex = 0;
      charRotationTarget = 0;
      createCharacterSprites();
      updateCharUI();
    }, 1200);
  }
}

function playSelectEffect(charData) {
  // Confetti burst
  spawnConfetti();

  // 3D particle effect based on character
  const count = 20;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i*3] = (Math.random() - 0.5) * 4;
    positions[i*3+1] = Math.random() * 4 + 1;
    positions[i*3+2] = (Math.random() - 0.5) * 4 + 3;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({color: charData.colorHex, size: 0.4, transparent: true});
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  gsap.to(mat, {opacity: 0, size: 0.1, duration: 1.5, onComplete: () => scene.remove(pts)});

  // Flash the stage
  if (charStage) {
    gsap.to(charStage.material, {emissiveIntensity: 0.8, duration: 0.2, yoyo: true, repeat: 3});
  }
}

function cleanupCharSelect() {
  charSprites.forEach(s => scene.remove(s));
  charSprites = [];
  if (charStage) { scene.remove(charStage); charStage = null; }
}

function lightenColor(hex, percent) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (num >> 16) + percent);
  const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
  const b = Math.min(255, (num & 0x0000FF) + percent);
  return `#${(r << 16 | g << 8 | b).toString(16).padStart(6,'0')}`;
}

// ===== MAIN THREE.JS INIT =====
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 28, 22);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({canvas: document.getElementById('three-canvas'), antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  clock = new THREE.Clock();
  setupLighting();
  createEnvironment();
  createFloatingParticles();
  window.addEventListener('resize', onResize);

  // Touch swipe for char select
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    if (!document.getElementById('char-screen').classList.contains('active')) return;
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(diff) > 50) rotateChars(diff > 0 ? -1 : 1);
  });

  animate();
}

function setupLighting() {
  scene.add(new THREE.AmbientLight(0x404060, 0.5));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(15, 25, 15);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  scene.add(dirLight);
  const n1 = new THREE.PointLight(0x00f5ff, 0.8, 40);
  n1.position.set(-10, 8, -10);
  scene.add(n1);
  const n2 = new THREE.PointLight(0xb967db, 0.6, 40);
  n2.position.set(10, 8, 10);
  scene.add(n2);
}

function createEnvironment() {
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({color: 0x080818, roughness: 0.9}));
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.5;
  ground.receiveShadow = true;
  scene.add(ground);
  const grid = new THREE.GridHelper(60, 30, 0x1a1a3e, 0x1a1a3e);
  grid.position.y = -0.49;
  scene.add(grid);
}

function createFloatingParticles() {
  const count = 150;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const cols = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3] = (Math.random()-0.5)*60;
    pos[i*3+1] = Math.random()*20+2;
    pos[i*3+2] = (Math.random()-0.5)*60;
    const c = new THREE.Color().setHSL(Math.random()*0.3+0.5, 0.8, 0.6);
    cols[i*3]=c.r; cols[i*3+1]=c.g; cols[i*3+2]=c.b;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  particleSystem = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.15, vertexColors: true, transparent: true, opacity: 0.6}));
  scene.add(particleSystem);
}

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  if (particleSystem) {
    particleSystem.rotation.y = time * 0.02;
    const p = particleSystem.geometry.attributes.position.array;
    for (let i = 1; i < p.length; i += 3) p[i] += Math.sin(time + i) * 0.001;
    particleSystem.geometry.attributes.position.needsUpdate = true;
  }
  boardTiles.forEach((tile, i) => { tile.position.y = Math.sin(time * 0.5 + i * 0.3) * 0.03; });
  // Billboard char sprites
  charSprites.forEach(s => s.lookAt(camera.position));
  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ===== START GAME =====
function startGame() {
  currentPlayerIndex = 0;
  turnNumber = 1;
  gameEnded = false;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('game-hud').classList.add('active');

  createBoard3D();
  createPlayerTokens();
  createDice3D();
  renderHUD();
  updateControls();

  gsap.to(camera.position, {x: 0, y: 22, z: 18, duration: 2, ease: 'power3.inOut'});
  gsap.to(camera.rotation, {x: -0.9, y: 0, z: 0, duration: 2, ease: 'power3.inOut'});
}

function createBoard3D() {
  boardTiles.forEach(t => scene.remove(t));
  boardTiles = [];
  for (let i = 0; i < TOTAL_CELLS; i++) {
    const data = boardLayout[i];
    const pos = getTilePosition(i);
    const geo = new THREE.BoxGeometry(TILE_SIZE, 0.4, TILE_SIZE);
    const mat = new THREE.MeshStandardMaterial({color: data.color, emissive: data.color, emissiveIntensity: 0.15, roughness: 0.4, metalness: 0.2, flatShading: true});
    const tile = new THREE.Mesh(geo, mat);
    tile.position.copy(pos);
    tile.castShadow = true;
    tile.receiveShadow = true;
    scene.add(tile);
    boardTiles.push(tile);
  }
}

function createPlayerTokens() {
  playerMeshes.forEach(m => scene.remove(m));
  playerMeshes = [];
  players.forEach((p, i) => {
    const group = new THREE.Group();
    const charColor = p.character ? p.character.colorHex : PLAYER_COLORS_HEX[i];
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.9, 8);
    const bodyMat = new THREE.MeshStandardMaterial({color: charColor, flatShading: true, emissive: charColor, emissiveIntensity: 0.1});
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.65;
    body.castShadow = true;
    group.add(body);
    const headGeo = new THREE.DodecahedronGeometry(0.25, 0);
    const head = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({color: 0xffcc99, flatShading: true}));
    head.position.y = 1.35;
    head.castShadow = true;
    group.add(head);
    const ringGeo = new THREE.RingGeometry(0.35, 0.55, 16);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({color: charColor, transparent: true, opacity: 0.6, side: THREE.DoubleSide}));
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.21;
    group.add(ring);

    const startPos = getTilePosition(0);
    group.position.set(startPos.x + (i-1.5)*0.4, 0, startPos.z + (i<2 ? -0.3 : 0.3));
    scene.add(group);
    playerMeshes.push(group);
    gsap.to(group.position, {y: '+=0.15', duration: 1.5+i*0.2, ease: 'sine.inOut', yoyo: true, repeat: -1});
  });
}

function createDice3D() {
  const geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
  const mat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.3});
  diceMesh = new THREE.Mesh(geo, mat);
  diceMesh.position.set(0, 15, 0);
  diceMesh.castShadow = true;
  diceMesh.visible = false;
  scene.add(diceMesh);
}

function moveToken3D(pi, targetTile) {
  return new Promise(resolve => {
    const token = playerMeshes[pi];
    const tp = getTilePosition(targetTile);
    const ox = (pi-1.5)*0.35;
    const oz = pi<2 ? -0.25 : 0.25;
    const tl = gsap.timeline({onComplete: resolve});
    tl.to(token.position, {y: 2.5, duration: 0.3, ease: 'power2.out'});
    tl.to(token.position, {x: tp.x+ox, z: tp.z+oz, duration: 0.5, ease: 'power2.inOut'}, '-=0.1');
    tl.to(token.position, {y: 0, duration: 0.4, ease: 'bounce.out'});
    const tile = boardTiles[targetTile];
    if (tile) gsap.to(tile.material, {emissiveIntensity: 0.8, duration: 0.3, yoyo: true, repeat: 1});
  });
}

// ===== HUD =====
function renderHUD() {
  const top = document.getElementById('hud-top');
  top.innerHTML = '';
  players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = `hud-card${i===currentPlayerIndex && !p.finished ? ' active-turn' : ''}`;
    const cColor = p.character ? p.character.color : PLAYER_COLORS_CSS[i];
    const charLabel = p.character ? p.character.id : '';
    const itemText = p.item ? ITEMS.find(it=>it.id===p.item).emoji : '-';
    card.innerHTML = `<div class="hc-name" style="color:${cColor}">${charLabel} ${p.name}</div><div class="hc-stats">💰${p.money} ❤️${p.motivation} ⭐${p.contribution}</div><div class="hc-item">🎒${itemText}</div>`;
    top.appendChild(card);
  });
}

function updateControls() {
  const p = players[currentPlayerIndex];
  document.getElementById('hud-turn-label').textContent = `Turn ${turnNumber} - ${p.name}`;
  document.getElementById('roll-btn').disabled = isRolling || p.finished;
  document.getElementById('dice-display').textContent = '?';
  const ib = document.getElementById('item-btn');
  ib.disabled = !p.item;
  ib.textContent = p.item ? ITEMS.find(it=>it.id===p.item).emoji : 'ITEM';
}

// ===== DICE ROLL =====
async function rollDice() {
  if (isRolling || gameEnded) return;
  isRolling = true;
  document.getElementById('roll-btn').disabled = true;
  const display = document.getElementById('dice-display');

  // 3D dice animation
  diceMesh.visible = true;
  diceMesh.position.set(0, 8, 0);
  gsap.to(diceMesh.rotation, {x: Math.PI*4+Math.random()*2, y: Math.PI*3+Math.random(), z: Math.PI*2, duration: 1.5, ease: 'power3.out'});
  gsap.to(diceMesh.position, {y: 1, duration: 1.2, ease: 'bounce.out', delay: 0.3});

  let count = 0;
  const spin = setInterval(() => { display.textContent = Math.floor(Math.random()*6)+1; count++; }, 60);

  await sleep(1800);
  clearInterval(spin);
  diceMesh.visible = false;

  const result = Math.floor(Math.random()*6)+1;
  display.textContent = result;
  gsap.fromTo(display, {scale:2, opacity:0}, {scale:1, opacity:1, duration:0.4, ease:'back.out(2)'});

  await movePlayer(result);
}

async function movePlayer(steps) {
  const p = players[currentPlayerIndex];
  const target = Math.min(p.position + steps, TOTAL_CELLS - 1);
  for (let pos = p.position + 1; pos <= target; pos++) {
    await moveToken3D(currentPlayerIndex, pos);
    p.position = pos;
    await sleep(150);
  }
  if (target >= TOTAL_CELLS - 1) {
    p.finished = true;
    p.finishOrder = players.filter(pp => pp.finished).length;
    const bonus = [60,40,20,0][p.finishOrder-1] || 0;
    p.contribution += bonus;
    spawnConfetti();
    showEventCard('🏁', `${p.name} ゴール！`, `${p.finishOrder}位！貢献度+${bonus}`, {contribution: bonus});
  } else {
    triggerCellEvent(target);
  }
}

// ===== CELL EVENTS =====
function triggerCellEvent(pos) {
  const cell = boardLayout[pos];
  switch(cell.type) {
    case 'bonus': spawnConfetti(); triggerBonus(); break;
    case 'pinch': shakeScreen(); triggerPinch(); break;
    case 'fate': showSlotMachine(); break;
    case 'history': triggerRandom(historyEvents); break;
    case 'battle': triggerBattle(); break;
    case 'hell': flashRed(); triggerHell(); break;
    case 'boss': triggerRandom(bossEvents); break;
    default: endTurn();
  }
}

function triggerBonus() {
  const p = players[currentPlayerIndex];
  const ev = bonusEvents[Math.floor(Math.random()*bonusEvents.length)];
  let effects = {...ev.effects};
  // Skill: S gets 1.5x bonus
  if (p.character && p.character.id === 'S') {
    effects.money = Math.round((effects.money || 0) * 1.5);
    effects.motivation = Math.round((effects.motivation || 0) * 1.5);
    effects.contribution = Math.round((effects.contribution || 0) * 1.5);
  }
  applyEffects(effects);
  // Skill: A spreads bonus to all
  if (p.character && p.character.id === 'A') {
    const halfEffects = {money: Math.round((effects.money||0)*0.5), motivation: Math.round((effects.motivation||0)*0.5), contribution: Math.round((effects.contribution||0)*0.5)};
    players.forEach((pp, i) => {
      if (i !== currentPlayerIndex && !pp.finished) {
        pp.money = Math.max(0, pp.money + halfEffects.money);
        pp.motivation = Math.max(0, pp.motivation + halfEffects.motivation);
        pp.contribution = Math.max(0, pp.contribution + halfEffects.contribution);
      }
    });
  }
  showEventCard(ev.emoji, ev.title, ev.description, effects);
}

function triggerPinch() {
  const p = players[currentPlayerIndex];
  if (p.shield) { p.shield = false; showEventCard('🛡️','責任転嫁発動！','マイナス完全回避！',{}); return; }
  triggerRandom(pinchEvents);
}

function triggerHell() {
  const p = players[currentPlayerIndex];
  // Skill: H nullifies hell
  if (p.character && p.character.id === 'H') {
    showEventCard('👊','物理的解決！','理不尽？パンチで解決。ダメージ無効化！',{});
    return;
  }
  if (p.shield) { p.shield = false; showEventCard('🛡️','責任転嫁発動！','地獄回避！',{}); return; }
  triggerRandom(hellEvents);
}

function triggerBattle() {
  const p = players[currentPlayerIndex];
  if (playerCount <= 1) { showTapChallenge(); return; }
  const opps = players.filter((pp,i) => i !== currentPlayerIndex && !pp.finished);
  if (opps.length === 0) { showTapChallenge(); return; }
  // Skill: K auto-wins battles
  if (p.character && p.character.id === 'K') {
    spawnConfetti();
    applyEffects({money:50, motivation:20, contribution:15});
    showEventCard('🔥','教育的指導発動！','怒りモードON！ 対決に自動勝利！',{money:50, motivation:20, contribution:15});
    return;
  }
  showJanken(opps);
}

function triggerRandom(list) {
  const ev = list[Math.floor(Math.random()*list.length)];
  applyEffects(ev.effects);
  showEventCard(ev.emoji, ev.title, ev.description, ev.effects);
}

function applyEffects(effects) {
  const p = players[currentPlayerIndex];
  if (effects.money) p.money = Math.max(0, p.money + effects.money);
  if (effects.motivation) p.motivation = Math.max(0, p.motivation + effects.motivation);
  if (effects.contribution) p.contribution = Math.max(0, p.contribution + effects.contribution);
}

// ===== EVENT CARD =====
function showEventCard(emoji, title, desc, effects) {
  document.getElementById('ev-emoji').textContent = emoji;
  document.getElementById('ev-title').textContent = title;
  document.getElementById('ev-desc').textContent = desc;
  const ef = document.getElementById('ev-effects');
  ef.innerHTML = '';
  if (effects.money) ef.innerHTML += `<span class="ev-badge ${effects.money>0?'pos':'neg'}">💰${effects.money>0?'+':''}${effects.money}</span>`;
  if (effects.motivation) ef.innerHTML += `<span class="ev-badge ${effects.motivation>0?'pos':'neg'}">❤️${effects.motivation>0?'+':''}${effects.motivation}</span>`;
  if (effects.contribution) ef.innerHTML += `<span class="ev-badge ${effects.contribution>0?'pos':'neg'}">⭐${effects.contribution>0?'+':''}${effects.contribution}</span>`;
  document.getElementById('event-overlay').classList.add('show');
  renderHUD();
}

function closeEvent() {
  document.getElementById('event-overlay').classList.remove('show');
  if (players.every(p => p.finished)) showEnding();
  else endTurn();
}

// ===== ITEMS =====
function useItem() {
  const p = players[currentPlayerIndex];
  if (!p.item) return;
  switch(p.item) {
    case 'drink': p.money+=30; p.motivation+=30; p.contribution+=30; p.item=null; showEventCard('🥤','栄養ドリンク！','全+30！',{money:30,motivation:30,contribution:30}); break;
    case 'blame': p.shield=true; p.item=null; showEventCard('📋','責任転嫁セット！','次マイナス無効！',{}); break;
    case 'meeting':
      players.forEach((pp,i) => { if(i!==currentPlayerIndex && !pp.finished) { pp.position=p.position; const tp=getTilePosition(p.position); gsap.to(playerMeshes[i].position,{x:tp.x+(i-1.5)*0.35, z:tp.z+(i<2?-0.25:0.25), duration:0.8, ease:'power2.inOut'}); }});
      p.item=null; showEventCard('📣','緊急会議！','全員召集！',{}); break;
  }
}

function maybeGiveItem() {
  const p = players[currentPlayerIndex];
  if (!p.item && Math.random() < 0.2) p.item = ITEMS[Math.floor(Math.random()*ITEMS.length)].id;
}

// ===== MINIGAMES =====
function showSlotMachine() {
  const ov = document.getElementById('minigame-overlay');
  const card = document.getElementById('mg-card');
  const symbols = ['🌟','😊','🙂','😐','😰','💀'];
  card.innerHTML = `<h3>運命のスロット</h3><p>STOPで止めろ！</p><div class="slot-machine"><div class="slot-reel" id="sr0">${symbols[0]}</div><div class="slot-reel" id="sr1">${symbols[0]}</div><div class="slot-reel" id="sr2">${symbols[0]}</div></div><button class="slot-stop-btn" id="slot-btn" onclick="stopSlotReel()">STOP!</button>`;
  ov.classList.add('show');
  const state = {stopped:[false,false,false], values:[0,0,0], current:0, intervals:[]};
  for (let i=0;i<3;i++) state.intervals[i] = setInterval(()=>{if(state.stopped[i])return; state.values[i]=Math.floor(Math.random()*symbols.length); document.getElementById(`sr${i}`).textContent=symbols[state.values[i]];}, 80+i*20);
  window._slotState = {...state, symbols};
}
function stopSlotReel() {
  const s=window._slotState; if(!s||s.current>=3)return;
  s.stopped[s.current]=true; clearInterval(s.intervals[s.current]);
  document.getElementById(`sr${s.current}`).classList.add('stopped');
  s.current++;
  if(s.current>=3){document.getElementById('slot-btn').disabled=true; setTimeout(resolveSlot,600);}
}
function resolveSlot() {
  const s=window._slotState; const best=Math.min(...s.values); const r=fateResults[best];
  applyEffects(r.effects);
  document.getElementById('minigame-overlay').classList.remove('show');
  if(best<=1) spawnConfetti();
  showEventCard(r.emoji, r.title, r.description, r.effects);
}

function showTapChallenge() {
  const ov=document.getElementById('minigame-overlay'); const card=document.getElementById('mg-card');
  const target=15+Math.floor(Math.random()*10);
  card.innerHTML=`<h3>連打チャレンジ！</h3><p>${target}回タップ！3秒以内！</p><div class="tap-area" id="tap-area" onclick="doTap()">👊</div><div class="tap-counter" id="tap-cnt">0/${target}</div><div class="tap-timer" id="tap-tmr">準備...</div>`;
  ov.classList.add('show');
  window._tapState={count:0,target,started:false,ended:false};
  setTimeout(()=>{if(window._tapState.ended)return; window._tapState.started=true; document.getElementById('tap-tmr').textContent='3.0秒'; let t=3000; const tm=setInterval(()=>{t-=100; if(t<=0||window._tapState.ended){clearInterval(tm);finishTap();return;} document.getElementById('tap-tmr').textContent=(t/1000).toFixed(1)+'秒';},100);},800);
}
function doTap(){const s=window._tapState;if(!s||!s.started||s.ended)return;s.count++;document.getElementById('tap-cnt').textContent=`${s.count}/${s.target}`;if(s.count>=s.target){s.ended=true;finishTap();}}
function finishTap(){const s=window._tapState;if(!s)return;s.ended=true;const ok=s.count>=s.target;setTimeout(()=>{document.getElementById('minigame-overlay').classList.remove('show');if(ok){spawnConfetti();applyEffects({money:40,motivation:20,contribution:15});showEventCard('🎊','連打成功！',`${s.count}回達成！`,{money:40,motivation:20,contribution:15});}else{applyEffects({money:-20,motivation:-15,contribution:0});showEventCard('😵','連打失敗...',`${s.count}/${s.target}回...`,{money:-20,motivation:-15,contribution:0});}},500);}

function showJanken(opps) {
  const opp=opps[Math.floor(Math.random()*opps.length)]; window._jankenOpp=opp;
  const ov=document.getElementById('minigame-overlay'); const card=document.getElementById('mg-card');
  card.innerHTML=`<h3>じゃんけん対決！</h3><p>${players[currentPlayerIndex].name} vs ${opp.name}</p><div class="janken-choices"><button class="janken-btn" onclick="doJanken('rock')">✊</button><button class="janken-btn" onclick="doJanken('scissors')">✌️</button><button class="janken-btn" onclick="doJanken('paper')">🖐️</button></div>`;
  ov.classList.add('show');
}
function doJanken(choice){const choices=['rock','scissors','paper'];const oc=choices[Math.floor(Math.random()*3)];let out;if(choice===oc)out='draw';else if((choice==='rock'&&oc==='scissors')||(choice==='scissors'&&oc==='paper')||(choice==='paper'&&oc==='rock'))out='win';else out='lose';document.querySelectorAll('.janken-btn').forEach(b=>b.disabled=true);setTimeout(()=>{document.getElementById('minigame-overlay').classList.remove('show');if(out==='win'){spawnConfetti();applyEffects({money:50,motivation:20,contribution:15});showEventCard('🎉','勝利！',`${window._jankenOpp.name}に勝った！`,{money:50,motivation:20,contribution:15});}else if(out==='lose'){applyEffects({money:-30,motivation:-15,contribution:-5});showEventCard('😭','敗北...',`${window._jankenOpp.name}に負けた...`,{money:-30,motivation:-15,contribution:-5});}else{applyEffects({money:10,motivation:10,contribution:5});showEventCard('🤝','あいこ！','引き分け！',{money:10,motivation:10,contribution:5});}},1200);}

// ===== VFX =====
function spawnConfetti(){const colors=['#ff4757','#3742fa','#2ed573','#ffa502','#b967db','#00f5ff','#39ff14'];for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.width=(Math.random()*8+5)+'px';p.style.height=(Math.random()*8+5)+'px';p.style.borderRadius=Math.random()>0.5?'50%':'2px';p.style.animationDuration=(Math.random()*2+2)+'s';p.style.animationDelay=Math.random()*0.5+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),4500);}}
function shakeScreen(){document.body.classList.add('shaking');setTimeout(()=>document.body.classList.remove('shaking'),500);gsap.to(camera.position,{x:'+=0.5',duration:0.05,yoyo:true,repeat:5});}
function flashRed(){const f=new THREE.PointLight(0xff0000,3,50);f.position.set(0,10,0);scene.add(f);gsap.to(f,{intensity:0,duration:1,ease:'power2.out',onComplete:()=>scene.remove(f)});}

// ===== TURNS =====
function endTurn(){maybeGiveItem();renderHUD();isRolling=false;let next=(currentPlayerIndex+1)%playerCount;let loop=0;while(players[next].finished&&loop<playerCount){next=(next+1)%playerCount;loop++;}if(players.every(p=>p.finished)){showEnding();return;}if(next<=currentPlayerIndex)turnNumber++;currentPlayerIndex=next;if(playerCount>1)showTurnTransition();else{updateControls();renderHUD();}}

function showTurnTransition(){const ov=document.getElementById('turn-overlay');const p=players[currentPlayerIndex];const cColor=p.character?p.character.color:PLAYER_COLORS_CSS[currentPlayerIndex];document.getElementById('turn-text').innerHTML=`<span style="color:${cColor}">${p.name}</span> のターン！`;ov.classList.add('show');const tp=getTilePosition(p.position);gsap.to(camera.position,{x:tp.x+5,y:15,z:tp.z+12,duration:1.5,ease:'power2.inOut'});let c=3;document.getElementById('turn-countdown').textContent=c;const tm=setInterval(()=>{c--;if(c<=0){clearInterval(tm);ov.classList.remove('show');gsap.to(camera.position,{x:0,y:22,z:18,duration:1,ease:'power2.inOut'});updateControls();renderHUD();}else document.getElementById('turn-countdown').textContent=c;},1000);}

// ===== ENDING =====
function showEnding(){gameEnded=true;document.getElementById('game-hud').classList.remove('active');showScreen('ending-screen');spawnConfetti();const sorted=[...players].sort((a,b)=>(b.money+b.motivation+b.contribution)-(a.money+a.motivation+a.contribution));const medals=['🥇','🥈','🥉','4️⃣'];const list=document.getElementById('ranking-list');list.innerHTML='';sorted.forEach((p,i)=>{const total=p.money+p.motivation+p.contribution;const item=document.createElement('li');item.className='ranking-item';item.style.animationDelay=`${i*0.2}s`;const cColor=p.character?p.character.color:'#fff';item.innerHTML=`<span class="rank">${medals[i]}</span><span class="r-name" style="color:${cColor}">${p.character?p.character.id+' ':''}${p.name}</span><span class="r-score">💰${p.money} ❤️${p.motivation} ⭐${p.contribution} = ${total}pt</span>`;list.appendChild(item);});}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ===== INIT =====
initThree();
</script>
</body>
</html>
