<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生ゲーム AODAISHO.ver</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
  background: linear-gradient(135deg, #1a237e 0%, #0d47a1 30%, #1565c0 60%, #42a5f5 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: #333;
}

.screen {
  display: none;
  width: 100%;
  min-height: 100vh;
  padding: 20px;
  animation: fadeIn 0.5s ease;
}

.screen.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  text-align: center;
}

.title-container {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 24px;
  padding: 60px 80px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  position: relative;
  overflow: hidden;
}

.title-container::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(25, 118, 210, 0.05), transparent, rgba(25, 118, 210, 0.05));
  animation: rotate 20s linear infinite;
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

.game-title {
  font-size: 3.2em;
  font-weight: 900;
  background: linear-gradient(135deg, #1565c0, #0d47a1, #1a237e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.game-subtitle {
  font-size: 1.4em;
  color: #1976d2;
  margin-bottom: 40px;
  position: relative;
  z-index: 1;
}

.btn {
  padding: 16px 48px;
  font-size: 1.2em;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  z-index: 1;
}

.btn-primary {
  background: linear-gradient(135deg, #1976d2, #1565c0);
  color: white;
  box-shadow: 0 8px 25px rgba(25, 118, 210, 0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 35px rgba(25, 118, 210, 0.5);
}

.btn-primary:active {
  transform: translateY(0);
}

/* ===== CHARACTER SELECT ===== */
#character-screen {
  text-align: center;
}

.character-screen-title {
  font-size: 2em;
  color: white;
  margin-bottom: 30px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.character-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 900px;
  margin-bottom: 30px;
}

.character-card {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 16px;
  padding: 24px 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 3px solid transparent;
  position: relative;
  overflow: hidden;
}

.character-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.character-card.selected {
  border-color: #ffab00;
  box-shadow: 0 0 20px rgba(255, 171, 0, 0.5);
}

.character-icon {
  font-size: 3em;
  margin-bottom: 10px;
}

.character-name {
  font-size: 1.2em;
  font-weight: 700;
  color: #1565c0;
  margin-bottom: 5px;
}

.character-role {
  font-size: 0.9em;
  color: #666;
  margin-bottom: 8px;
}

.character-skill {
  font-size: 0.85em;
  color: #1976d2;
  background: #e3f2fd;
  padding: 4px 10px;
  border-radius: 12px;
  display: inline-block;
}

/* ===== GAME BOARD ===== */
#game-screen {
  justify-content: flex-start;
  padding-top: 10px;
}

.stats-bar {
  display: flex;
  gap: 24px;
  background: rgba(255, 255, 255, 0.95);
  padding: 16px 32px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  flex-wrap: wrap;
  justify-content: center;
}

.stat-item {
  text-align: center;
}

.stat-label {
  font-size: 0.8em;
  color: #666;
  margin-bottom: 4px;
}

.stat-value {
  font-size: 1.4em;
  font-weight: 700;
}

.stat-money .stat-value { color: #f9a825; }
.stat-motivation .stat-value { color: #e53935; }
.stat-contribution .stat-value { color: #43a047; }
.stat-position .stat-value { color: #1565c0; }

.board-container {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 900px;
  margin-bottom: 15px;
}

.board-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.board-cell {
  aspect-ratio: 1;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.7em;
  font-weight: 600;
  position: relative;
  border: 2px solid #e0e0e0;
  transition: all 0.3s ease;
  padding: 4px;
}

.board-cell.start { background: #e3f2fd; border-color: #1976d2; }
.board-cell.goal { background: #fff3e0; border-color: #ff9800; }
.board-cell.history { background: #e8f5e9; border-color: #66bb6a; }
.board-cell.choice { background: #fff8e1; border-color: #ffc107; }
.board-cell.bonus { background: #e1f5fe; border-color: #29b6f6; }
.board-cell.crisis { background: #fce4ec; border-color: #ef5350; }
.board-cell.celebration { background: #f3e5f5; border-color: #ab47bc; }
.board-cell.rest { background: #f5f5f5; border-color: #bdbdbd; }

.board-cell.current {
  box-shadow: 0 0 15px rgba(25, 118, 210, 0.6);
  transform: scale(1.05);
  z-index: 2;
}

.cell-number {
  font-size: 0.8em;
  color: #999;
  position: absolute;
  top: 3px;
  left: 6px;
}

.cell-icon {
  font-size: 1.6em;
  margin-bottom: 2px;
}

.cell-label {
  text-align: center;
  line-height: 1.2;
  font-size: 0.75em;
}

.player-token {
  position: absolute;
  bottom: 4px;
  right: 4px;
  font-size: 1.2em;
  animation: bounce 1s ease infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.roulette-section {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 10px;
}

.roulette-display {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #1976d2, #0d47a1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5em;
  font-weight: 900;
  color: white;
  box-shadow: 0 5px 20px rgba(25, 118, 210, 0.4);
}

.roulette-display.spinning {
  animation: spin 0.1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(5deg) scale(1.05); }
  50% { transform: rotate(0deg) scale(1); }
  75% { transform: rotate(-5deg) scale(1.05); }
}

.btn-roulette {
  padding: 14px 36px;
  font-size: 1.1em;
  background: linear-gradient(135deg, #ff6f00, #ff8f00);
  color: white;
  border: none;
  border-radius: 50px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(255, 111, 0, 0.4);
  transition: all 0.3s ease;
}

.btn-roulette:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255, 111, 0, 0.5);
}

.btn-roulette:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: white;
  border-radius: 20px;
  padding: 40px;
  max-width: 500px;
  width: 100%;
  text-align: center;
  animation: modalIn 0.4s ease;
  position: relative;
  overflow: hidden;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.8) translateY(30px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-type-icon {
  font-size: 3em;
  margin-bottom: 15px;
}

.modal-title {
  font-size: 1.5em;
  font-weight: 700;
  color: #1565c0;
  margin-bottom: 12px;
}

.modal-description {
  font-size: 1em;
  color: #555;
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-effects {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.effect-badge {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 600;
}

.effect-positive { background: #e8f5e9; color: #2e7d32; }
.effect-negative { background: #fce4ec; color: #c62828; }
.effect-neutral { background: #f5f5f5; color: #616161; }

.choice-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 16px;
}

.btn-choice {
  padding: 14px 24px;
  font-size: 1em;
  font-weight: 600;
  border: 2px solid #1976d2;
  border-radius: 12px;
  background: white;
  color: #1976d2;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-choice:hover {
  background: #1976d2;
  color: white;
}

.btn-modal-close {
  padding: 12px 36px;
  font-size: 1em;
  background: linear-gradient(135deg, #1976d2, #1565c0);
  color: white;
  border: none;
  border-radius: 50px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-modal-close:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(25, 118, 210, 0.4);
}

/* ===== RESULT SCREEN ===== */
#result-screen, #ending-screen {
  text-align: center;
}

.result-container, .ending-container {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 24px;
  padding: 50px 60px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  max-width: 600px;
  width: 100%;
}

.result-title {
  font-size: 2em;
  font-weight: 900;
  color: #1565c0;
  margin-bottom: 30px;
}

.result-stats {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 30px;
}

.result-stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: #f5f5f5;
  border-radius: 12px;
}

.result-stat-label {
  font-weight: 600;
  color: #555;
}

.result-stat-value {
  font-size: 1.3em;
  font-weight: 700;
}

.total-score {
  font-size: 2.5em;
  font-weight: 900;
  color: #1565c0;
  margin: 20px 0;
}

.rank-display {
  font-size: 4em;
  font-weight: 900;
  margin: 10px 0 20px;
}

.rank-S { color: #ff6f00; text-shadow: 0 0 20px rgba(255, 111, 0, 0.5); }
.rank-A { color: #e53935; }
.rank-B { color: #1976d2; }
.rank-C { color: #757575; }

/* ===== ENDING SCREEN ===== */
.ending-icon {
  font-size: 4em;
  margin-bottom: 15px;
}

.ending-title {
  font-size: 2em;
  font-weight: 900;
  margin-bottom: 15px;
}

.ending-message {
  font-size: 1.1em;
  color: #555;
  line-height: 1.8;
  margin-bottom: 30px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .character-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .title-container {
    padding: 40px 30px;
  }
  .game-title {
    font-size: 2.2em;
  }
  .board-grid {
    gap: 4px;
  }
  .board-cell {
    font-size: 0.6em;
  }
  .stats-bar {
    gap: 12px;
    padding: 12px 16px;
  }
  .result-container, .ending-container {
    padding: 30px 20px;
  }
}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="title-container">
    <div class="game-title">人生ゲーム</div>
    <div class="game-subtitle">AODAISHO.ver</div>
    <button class="btn btn-primary" onclick="showScreen('character-screen')">🎮 ゲームスタート</button>
  </div>
</div>

<!-- CHARACTER SELECT -->
<div id="character-screen" class="screen">
  <h2 class="character-screen-title">🎭 キャラクターを選んでください</h2>
  <div class="character-grid" id="character-grid"></div>
  <button class="btn btn-primary" id="btn-start-game" onclick="startGame()" disabled>ゲーム開始</button>
</div>

<!-- GAME BOARD -->
<div id="game-screen" class="screen">
  <div class="stats-bar">
    <div class="stat-item stat-money">
      <div class="stat-label">💰 資金</div>
      <div class="stat-value" id="stat-money">100</div>
    </div>
    <div class="stat-item stat-motivation">
      <div class="stat-label">🔥 モチベーション</div>
      <div class="stat-value" id="stat-motivation">50</div>
    </div>
    <div class="stat-item stat-contribution">
      <div class="stat-label">⭐ 会社貢献度</div>
      <div class="stat-value" id="stat-contribution">0</div>
    </div>
    <div class="stat-item stat-position">
      <div class="stat-label">📍 現在地</div>
      <div class="stat-value" id="stat-position">0/25</div>
    </div>
  </div>
  <div class="board-container">
    <div class="board-grid" id="board-grid"></div>
  </div>
  <div class="roulette-section">
    <div class="roulette-display" id="roulette-display">?</div>
    <button class="btn-roulette" id="btn-roulette" onclick="spinRoulette()">🎲 ルーレット回す！</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" class="screen">
  <div class="result-container">
    <h2 class="result-title">📊 結果発表</h2>
    <div class="result-stats">
      <div class="result-stat-row">
        <span class="result-stat-label">💰 資金</span>
        <span class="result-stat-value" id="result-money">0</span>
      </div>
      <div class="result-stat-row">
        <span class="result-stat-label">🔥 モチベーション</span>
        <span class="result-stat-value" id="result-motivation">0</span>
      </div>
      <div class="result-stat-row">
        <span class="result-stat-label">⭐ 会社貢献度</span>
        <span class="result-stat-value" id="result-contribution">0</span>
      </div>
    </div>
    <div>総合スコア</div>
    <div class="total-score" id="total-score">0</div>
    <div>ランク</div>
    <div class="rank-display" id="rank-display">-</div>
    <button class="btn btn-primary" onclick="showEnding()">エンディングを見る →</button>
  </div>
</div>

<!-- ENDING SCREEN -->
<div id="ending-screen" class="screen">
  <div class="ending-container">
    <div class="ending-icon" id="ending-icon">🏆</div>
    <h2 class="ending-title" id="ending-title">-</h2>
    <p class="ending-message" id="ending-message">-</p>
    <button class="btn btn-primary" onclick="resetGame()">🔄 スタートに戻る</button>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-type-icon" id="modal-icon">📢</div>
    <h3 class="modal-title" id="modal-title">-</h3>
    <p class="modal-description" id="modal-description">-</p>
    <div class="modal-effects" id="modal-effects"></div>
    <div id="modal-choices"></div>
    <button class="btn-modal-close" id="btn-modal-close" onclick="closeModal()">OK</button>
  </div>
</div>

<script>
// ===== GAME DATA =====
const characters = [
  { id: 'D', name: '男性D', role: '戦略家', icon: '🧠', skill: '初期モチベーション +20', bonus: { motivation: 20 }, passive: null },
  { id: 'S', name: '男性S', role: 'エンジニア', icon: '💻', skill: '初期資金 +50', bonus: { money: 50 }, passive: null },
  { id: 'G', name: '男性G', role: '期待の星', icon: '🌟', skill: '初期会社貢献度 +20', bonus: { contribution: 20 }, passive: null },
  { id: 'A', name: '女性A', role: 'ムードメーカー', icon: '🎉', skill: 'モチベーション減少半減', bonus: {}, passive: 'halfMotivationLoss' },

];

  {

  {

  {

  {

      { text: "思い切って抜擢", effects: { money: 0, motivation: 20, contribution: 25 }},
      { text: "経験者に任せる", effects: { money: 10, motivation: -5, contribution: 10 }}
    ]
  },
  {
    type: "celebration",
    title: "最優秀チーム賞",
    description: "チーム全員の努力が認められた！",
    effects: { money: 10, motivation: 30, contribution: 20 }
  },
  {
    type: "bonus",
    title: "投資ラウンド成功",
    description: "新たな投資家からの資金調達に成功！",
    effects: { money: 80, motivation: 15, contribution: 10 }
  },
  {
    type: "crisis",
    title: "人材流出危機",
    description: "複数の優秀な社員が転職を検討中…",
    effects: { money: -20, motivation: -30, contribution: -15 }
  },
  {
    type: "history",
    title: "新サービスローンチ",
    description: "長年準備してきた新サービスがついにリリース！",
    effects: { money: -30, motivation: 25, contribution: 25 }
  },
  {
    type: "choice",
    title: "競合からの買収提案",
    description: "大手企業から買収の打診が…",
    choices: [
      { text: "独立を維持する", effects: { money: 0, motivation: 20, contribution: 30 }},
      { text: "条件を聞く", effects: { money: 50, motivation: -10, contribution: -5 }}
    ]
  },
  {
    type: "bonus",
    title: "過去最高売上",
    description: "創業以来最高の売上を記録！",
    effects: { money: 70, motivation: 25, contribution: 20 }
  },
  {
    type: "celebration",
    title: "15周年＆未来への誓い",
    description: "15年の感謝と、これからの100年に向けた決意を新たに！",
    effects: { money: -10, motivation: 30, contribution: 25 }
  }
];

// Board cell definitions (25 cells)
const boardCells = [];
function generateBoard() {
  boardCells.length = 0;
  boardCells.push({ type: 'start', label: 'スタート', icon: '🚀' });

  // Distribute events across cells 1-23
  const eventIndices = [];
  const totalEventSlots = 22; // cells 1 to 23 (minus some rest)
  const eventsToPlace = Math.min(companyEvents.length, 18);
  const step = totalEventSlots / eventsToPlace;

  for (let i = 0; i < eventsToPlace; i++) {
    eventIndices.push(Math.round(1 + i * step));
  }

  let eventIdx = 0;
  for (let i = 1; i <= 23; i++) {
    if (eventIndices.includes(i) && eventIdx < companyEvents.length) {
      const ev = companyEvents[eventIdx];
      boardCells.push({
        type: ev.type,
        label: ev.title.substring(0, 6),
        icon: getEventIcon(ev.type),
        eventIndex: eventIdx
      });
      eventIdx++;
    } else {
      boardCells.push({ type: 'rest', label: '休憩', icon: '☕' });
    }
  }

  boardCells.push({ type: 'goal', label: 'ゴール', icon: '🏁' });
}

function getEventIcon(type) {
  const icons = { history: '📜', choice: '🤔', bonus: '🎁', crisis: '⚠️', celebration: '🎊' };
  return icons[type] || '📌';
}

// ===== GAME STATE =====
let gameState = {
  character: null,
  position: 0,
  money: 100,
  motivation: 50,
  contribution: 0,
  isSpinning: false
};

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== CHARACTER SELECT =====
function renderCharacters() {
  const grid = document.getElementById('character-grid');
  grid.innerHTML = characters.map(c => `
    <div class="character-card" data-id="${c.id}" onclick="selectCharacter('${c.id}')">
      <div class="character-icon">${c.icon}</div>
      <div class="character-name">${c.name}</div>
      <div class="character-role">${c.role}</div>
      <div class="character-skill">${c.skill}</div>
    </div>
  `).join('');
}

function selectCharacter(id) {
  gameState.character = characters.find(c => c.id === id);
  document.querySelectorAll('.character-card').forEach(card => {
    card.classList.toggle('selected', card.dataset.id === id);
  });
  document.getElementById('btn-start-game').disabled = false;
}

// ===== GAME START =====
function startGame() {
  if (!gameState.character) return;

  // Apply character bonus
  gameState.money = 100 + (gameState.character.bonus.money || 0);
  gameState.motivation = 50 + (gameState.character.bonus.motivation || 0);
  gameState.contribution = 0 + (gameState.character.bonus.contribution || 0);
  gameState.position = 0;

  generateBoard();
  renderBoard();
  updateStats();
  showScreen('game-screen');
}

// ===== BOARD RENDERING =====
function renderBoard() {
  const grid = document.getElementById('board-grid');
  // Snake layout: rows alternate direction
  const rows = 5;
  const cols = 5;
  const orderedCells = [];

  for (let row = 0; row < rows; row++) {
    const rowCells = [];
    for (let col = 0; col < cols; col++) {
      const idx = row * cols + col;
      if (idx < boardCells.length) {
        rowCells.push(idx);
      }
    }
    if (row % 2 === 1) rowCells.reverse();
    orderedCells.push(...rowCells);
  }

  grid.innerHTML = orderedCells.map((cellIdx, displayIdx) => {
    const cell = boardCells[cellIdx];
    if (!cell) return '<div class="board-cell"></div>';
    const isCurrent = cellIdx === gameState.position;
    return `
      <div class="board-cell ${cell.type} ${isCurrent ? 'current' : ''}" data-cell="${cellIdx}">
        <span class="cell-number">${cellIdx}</span>
        <span class="cell-icon">${cell.icon}</span>
        <span class="cell-label">${cell.label}</span>
        ${isCurrent ? '<span class="player-token">' + (gameState.character ? gameState.character.icon : '🔵') + '</span>' : ''}
      </div>
    `;
  }).join('');
}

// ===== STATS UPDATE =====
function updateStats() {
  gameState.motivation = Math.max(0, Math.min(100, gameState.motivation));
  document.getElementById('stat-money').textContent = gameState.money;
  document.getElementById('stat-motivation').textContent = gameState.motivation;
  document.getElementById('stat-contribution').textContent = gameState.contribution;
  document.getElementById('stat-position').textContent = `${gameState.position}/25`;
}

// ===== ROULETTE =====
function spinRoulette() {
  if (gameState.isSpinning) return;
  if (gameState.position >= 24) {
    showResults();
    return;
  }

  gameState.isSpinning = true;
  const display = document.getElementById('roulette-display');
  const btn = document.getElementById('btn-roulette');
  btn.disabled = true;
  display.classList.add('spinning');

  let count = 0;
  const maxCount = 20;
  const interval = setInterval(() => {
    display.textContent = Math.floor(Math.random() * 6) + 1;
    count++;
    if (count >= maxCount) {
      clearInterval(interval);
      const result = Math.floor(Math.random() * 6) + 1;
      display.textContent = result;
      display.classList.remove('spinning');
      movePlayer(result);
    }
  }, 80);
}

function movePlayer(steps) {
  const targetPosition = Math.min(gameState.position + steps, 24);
  let current = gameState.position;

  const moveInterval = setInterval(() => {
    current++;
    if (current > targetPosition) {
      current = targetPosition;
    }
    gameState.position = current;
    renderBoard();
    updateStats();

    if (current >= targetPosition) {
      clearInterval(moveInterval);
      setTimeout(() => {
        checkCell();
      }, 300);
    }
  }, 300);
}

function checkCell() {
  const cell = boardCells[gameState.position];

  if (gameState.position >= 24) {
    // Goal reached
    gameState.isSpinning = false;
    setTimeout(() => showResults(), 500);
    return;
  }

  if (cell && cell.eventIndex !== undefined) {
    showEvent(companyEvents[cell.eventIndex]);
  } else if (cell && cell.type === 'rest') {
    // Rest cell - small motivation recovery
    gameState.motivation = Math.min(100, gameState.motivation + 5);
    updateStats();
    showRestModal();
  } else {
    gameState.isSpinning = false;
    document.getElementById('btn-roulette').disabled = false;
  }
}

function showRestModal() {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-icon').textContent = '☕';
  document.getElementById('modal-title').textContent = '休憩タイム';
  document.getElementById('modal-description').textContent = 'ちょっと一息。モチベーションが少し回復した！';
  document.getElementById('modal-effects').innerHTML = '<span class="effect-badge effect-positive">🔥 モチベ +5</span>';
  document.getElementById('modal-choices').innerHTML = '';
  document.getElementById('btn-modal-close').style.display = 'inline-block';
  overlay.classList.add('active');
}

// ===== EVENT DISPLAY =====
function showEvent(event) {
  const overlay = document.getElementById('modal-overlay');
  const icons = { history: '📜', choice: '🤔', bonus: '🎁', crisis: '⚠️', celebration: '🎊' };

  document.getElementById('modal-icon').textContent = icons[event.type] || '📌';
  document.getElementById('modal-title').textContent = event.title;
  document.getElementById('modal-description').textContent = event.description;

  const choicesDiv = document.getElementById('modal-choices');
  const effectsDiv = document.getElementById('modal-effects');
  const closeBtn = document.getElementById('btn-modal-close');

  if (event.type === 'choice') {
    effectsDiv.innerHTML = '';
    closeBtn.style.display = 'none';
    choicesDiv.innerHTML = '<div class="choice-buttons">' +
      event.choices.map((choice, idx) => `
        <button class="btn-choice" onclick="makeChoice(${idx})">${choice.text}</button>
      `).join('') + '</div>';
  } else {
    choicesDiv.innerHTML = '';
    closeBtn.style.display = 'inline-block';
    effectsDiv.innerHTML = renderEffects(event.effects);
    applyEffects(event.effects);
    updateStats();
  }

  overlay.classList.add('active');
}

function makeChoice(idx) {
  const cell = boardCells[gameState.position];
  const event = companyEvents[cell.eventIndex];
  const choice = event.choices[idx];

  document.getElementById('modal-effects').innerHTML = renderEffects(choice.effects);
  document.getElementById('modal-choices').innerHTML = '';
  document.getElementById('btn-modal-close').style.display = 'inline-block';

  applyEffects(choice.effects);
  updateStats();
}

function renderEffects(effects) {
  let html = '';
  if (effects.money !== 0) {
    const cls = effects.money > 0 ? 'effect-positive' : 'effect-negative';
    html += `<span class="effect-badge ${cls}">💰 ${effects.money > 0 ? '+' : ''}${effects.money}</span>`;
  }
  if (effects.motivation !== 0) {
    const cls = effects.motivation > 0 ? 'effect-positive' : 'effect-negative';
    html += `<span class="effect-badge ${cls}">🔥 ${effects.motivation > 0 ? '+' : ''}${effects.motivation}</span>`;
  }
  if (effects.contribution !== 0) {
    const cls = effects.contribution > 0 ? 'effect-positive' : 'effect-negative';
    html += `<span class="effect-badge ${cls}">⭐ ${effects.contribution > 0 ? '+' : ''}${effects.contribution}</span>`;
  }
  return html;
}

function applyEffects(effects) {
  const passive = gameState.character ? gameState.character.passive : null;

  let moneyChange = effects.money || 0;
  let motivationChange = effects.motivation || 0;
  let contributionChange = effects.contribution || 0;

  // Apply passive abilities
  if (passive === 'halfMoneyLoss' && moneyChange < 0) {
    moneyChange = Math.ceil(moneyChange / 2);
  }
  if (passive === 'halfMotivationLoss' && motivationChange < 0) {
    motivationChange = Math.ceil(motivationChange / 2);
  }
  if (passive === 'halfContributionLoss' && contributionChange < 0) {
    contributionChange = Math.ceil(contributionChange / 2);
  }

  gameState.money += moneyChange;
  gameState.motivation += motivationChange;
  gameState.contribution += contributionChange;

  // Clamp motivation
  gameState.motivation = Math.max(0, Math.min(100, gameState.motivation));
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  gameState.isSpinning = false;
  document.getElementById('btn-roulette').disabled = false;
}

// ===== RESULTS =====
function showResults() {
  document.getElementById('result-money').textContent = gameState.money;
  document.getElementById('result-motivation').textContent = gameState.motivation;
  document.getElementById('result-contribution').textContent = gameState.contribution;

  const totalScore = gameState.money + gameState.motivation + gameState.contribution;
  document.getElementById('total-score').textContent = totalScore;

  let rank, rankClass;
  if (totalScore >= 350) { rank = 'S'; rankClass = 'rank-S'; }
  else if (totalScore >= 250) { rank = 'A'; rankClass = 'rank-A'; }
  else if (totalScore >= 150) { rank = 'B'; rankClass = 'rank-B'; }
  else { rank = 'C'; rankClass = 'rank-C'; }

  const rankEl = document.getElementById('rank-display');
  rankEl.textContent = rank;
  rankEl.className = 'rank-display ' + rankClass;

  showScreen('result-screen');
}

  if (gameState.contribution >= 100) {
    icon = '🏆';
    title = '伝説の社員エンド';
    message = 'あなたはAODAISHOの歴史に名を刻む伝説の社員となりました。\n\n会社への貢献は計り知れず、後輩たちから尊敬される存在に。\nあなたの情熱と努力が、会社の成長を支え続けました。\n\n「一人ひとりの力が、大きな流れをつくる」\n——それを体現した、最高の仲間でした。';
  } else if (gameState.money >= 300) {
    icon = '💎';
    title = '大富豪エンド';
    message = '卓越したビジネスセンスで、あなたは大きな富を築きました。\n\n数々の案件を成功に導き、会社の売上を何倍にも成長させた立役者。\n「お金は信頼の証」——クライアントからの信頼を積み重ねた結果です。\n\nこれからも、その手腕でAODAISHOを導いてください。';
  } else if (gameState.motivation <= 20) {
    icon = '😮‍💨';
    title = '燃え尽きエンド';
    message = '全力で走り続けた結果、少し疲れてしまったようです。\n\nでも大丈夫。休むことも、立ち止まることも大切な選択です。\n仲間たちがあなたを待っています。\n\n「焦らなくていい。また一緒に歩き出そう。」\n——AODAISHOは、いつでもあなたの味方です。';
  } else {
    icon = '🌱';
    title = 'バランス成長エンド';
    message = '着実に、バランスよく成長を続けてきました。\n\n派手さはなくても、確かな一歩一歩が今のあなたを作っています。\n資金も、モチベーションも、貢献も——すべてが調和した理想的な歩み。\n\n「継続は力なり」\n——AODAISHOと共に、これからも前へ。';
  }

  document.getElementById('ending-icon').textContent = icon;
  document.getElementById('ending-title').textContent = title;
  document.getElementById('ending-message').textContent = message;

  showScreen('ending-screen');
}

// ===== RESET =====
function resetGame() {
  gameState = {
    character: null,
    position: 0,
    money: 100,
    motivation: 50,
    contribution: 0,
    isSpinning: false
  };
  document.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('btn-start-game').disabled = true;
  document.getElementById('roulette-display').textContent = '?';
  document.getElementById('btn-roulette').disabled = false;
  showScreen('title-screen');
}

// ===== INIT =====
renderCharacters();
</script>
