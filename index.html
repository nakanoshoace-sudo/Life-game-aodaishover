<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生ゲーム AODAISHO.ver</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #1a3a6b;
  --color-accent: #e8a020;
  --color-success: #2e7d32;
  --color-danger: #c62828;
  --color-bg: #faf6f0;
  --color-card: #ffffff;
  --font-title: 'Noto Serif JP', serif;
  --font-body: 'Noto Sans JP', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--color-bg);
  min-height: 100vh;
  overflow-x: hidden;
  color: #333;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
  width: 100%;
  min-height: 100vh;
  padding: 24px;
  animation: fadeIn 0.5s ease;
}
.screen.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== COMMON ===== */
.card {
  background: var(--color-card);
  border-radius: 20px;
  padding: 48px 56px;
  box-shadow: 0 8px 40px rgba(26,58,107,0.08), 0 2px 8px rgba(0,0,0,0.04);
  max-width: 700px;
  width: 100%;
  text-align: center;
}

.title-xl {
  font-family: var(--font-title);
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--color-primary);
  margin-bottom: 8px;
}

.title-lg {
  font-family: var(--font-title);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 16px;
}

.subtitle {
  font-size: 1.1rem;
  color: #666;
  margin-bottom: 32px;
}

.btn {
  padding: 14px 40px;
  font-size: 1.1rem;
  font-weight: 700;
  font-family: var(--font-body);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: inline-block;
}

.btn-primary {
  background: var(--color-primary);
  color: white;
  box-shadow: 0 6px 20px rgba(26,58,107,0.3);
}
.btn-primary:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 30px rgba(26,58,107,0.4);
}
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.btn-accent {
  background: var(--color-accent);
  color: white;
  box-shadow: 0 6px 20px rgba(232,160,32,0.3);
}
.btn-accent:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 30px rgba(232,160,32,0.4);
}

.btn-outline {
  background: transparent;
  color: var(--color-primary);
  border: 2px solid var(--color-primary);
}
.btn-outline:hover {
  background: var(--color-primary);
  color: white;
}

/* ===== TITLE SCREEN ===== */
.title-logo {
  font-family: var(--font-title);
  font-size: 1rem;
  color: var(--color-accent);
  letter-spacing: 4px;
  margin-bottom: 12px;
  text-transform: uppercase;
}

/* ===== PLAYER COUNT ===== */
.count-grid {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.count-btn {
  width: 80px;
  height: 80px;
  border-radius: 16px;
  border: 3px solid #e0e0e0;
  background: white;
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-primary);
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: var(--font-body);
}
.count-btn:hover { border-color: var(--color-accent); transform: scale(1.05); }
.count-btn.selected { border-color: var(--color-accent); background: #fff8e8; box-shadow: 0 0 15px rgba(232,160,32,0.3); }

/* ===== PLAYER SETUP ===== */
.setup-card {
  background: var(--color-card);
  border-radius: 20px;
  padding: 32px;
  box-shadow: 0 8px 40px rgba(26,58,107,0.08);
  max-width: 600px;
  width: 100%;
  text-align: center;
}

.player-badge {
  display: inline-block;
  padding: 4px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  color: white;
  margin-bottom: 16px;
}

.input-field {
  width: 100%;
  max-width: 300px;
  padding: 12px 20px;
  font-size: 1rem;
  font-family: var(--font-body);
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  outline: none;
  transition: border-color 0.3s ease;
  margin-bottom: 24px;
}
.input-field:focus { border-color: var(--color-primary); }

.char-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.char-card {
  padding: 16px 8px;
  border-radius: 14px;
  border: 2px solid #e8e8e8;
  cursor: pointer;
  transition: all 0.3s ease;
  background: white;
}
.char-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
.char-card.selected { border-color: var(--color-accent); background: #fffcf5; }
.char-card.taken { opacity: 0.35; pointer-events: none; }
.char-card .icon { font-size: 2.2rem; margin-bottom: 6px; }
.char-card .name { font-family: var(--font-title); font-size: 0.95rem; font-weight: 700; color: var(--color-primary); }
.char-card .role { font-size: 0.75rem; color: #888; margin: 2px 0; }
.char-card .skill { font-size: 0.7rem; color: var(--color-primary); background: #eef2fa; padding: 3px 8px; border-radius: 8px; display: inline-block; margin-top: 4px; }

/* ===== GAME SCREEN ===== */
#game-screen {
  justify-content: flex-start;
  padding: 12px;
}

.game-header {
  width: 100%;
  max-width: 1000px;
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.player-stat-card {
  background: var(--color-card);
  border-radius: 14px;
  padding: 12px 18px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.05);
  min-width: 180px;
  flex: 1;
  max-width: 240px;
  border-left: 4px solid transparent;
  transition: all 0.3s ease;
}
.player-stat-card.active-turn { border-left-color: var(--color-accent); box-shadow: 0 4px 20px rgba(232,160,32,0.2); }
.player-stat-card.finished { opacity: 0.5; }

.psc-name {
  font-family: var(--font-title);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 6px;
}
.psc-stats {
  display: flex;
  gap: 10px;
  font-size: 0.75rem;
}
.psc-stat { display: flex; flex-direction: column; align-items: center; }
.psc-stat-label { color: #999; font-size: 0.65rem; }
.psc-stat-value { font-weight: 700; font-size: 0.9rem; }
.psc-stat-money .psc-stat-value { color: var(--color-accent); }
.psc-stat-moti .psc-stat-value { color: var(--color-danger); }
.psc-stat-cont .psc-stat-value { color: var(--color-success); }

.board-wrapper {
  background: var(--color-card);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 40px rgba(26,58,107,0.08);
  width: 100%;
  max-width: 1000px;
  margin-bottom: 12px;
}

.board-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

.cell {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  border: 2px solid #eee;
  transition: all 0.3s ease;
  padding: 3px;
  font-size: 0.65rem;
}
.cell.start { background: #eef2fa; border-color: var(--color-primary); }
.cell.goal { background: #fff8e8; border-color: var(--color-accent); }
.cell.history { background: #e8f5e9; border-color: #66bb6a; }
.cell.choice { background: #fff8e1; border-color: #ffc107; }
.cell.bonus { background: #e3f2fd; border-color: #42a5f5; }
.cell.crisis { background: #fce4ec; border-color: #ef5350; }
.cell.celebration { background: #f3e5f5; border-color: #ab47bc; }
.cell.credo { background: #e0f2f1; border-color: #26a69a; }
.cell.rest { background: #fafafa; border-color: #e0e0e0; }

.cell-num { position: absolute; top: 2px; left: 5px; font-size: 0.6rem; color: #bbb; }
.cell-icon { font-size: 1.4rem; }
.cell-label { text-align: center; line-height: 1.1; font-weight: 600; margin-top: 2px; }

.cell-tokens {
  position: absolute;
  bottom: 2px;
  right: 2px;
  display: flex;
  gap: 1px;
  font-size: 0.8rem;
}

.token {
  animation: tokenBounce 1.2s ease infinite;
}
@keyframes tokenBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

.game-footer {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 8px;
}

.turn-indicator {
  font-family: var(--font-title);
  font-size: 1.1rem;
  color: var(--color-primary);
}

.roulette-container {
  display: flex;
  align-items: center;
  gap: 16px;
}

.roulette-wheel {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--color-primary), #0d2240);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  font-weight: 900;
  color: white;
  box-shadow: 0 4px 16px rgba(26,58,107,0.3);
  transition: transform 0.1s;
}
.roulette-wheel.spinning {
  animation: rouletteSpin 0.15s linear infinite;
}
@keyframes rouletteSpin {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(8deg) scale(1.06); }
  50% { transform: rotate(0deg) scale(1); }
  75% { transform: rotate(-8deg) scale(1.06); }
}

.btn-roll {
  padding: 12px 32px;
  font-size: 1.05rem;
  background: linear-gradient(135deg, var(--color-accent), #d4900a);
  color: white;
  border: none;
  border-radius: 50px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(232,160,32,0.35);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: var(--font-body);
}
.btn-roll:hover { transform: translateY(-2px) scale(1.03); }
.btn-roll:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ===== TURN TRANSITION ===== */
#turn-screen .card {
  animation: turnPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes turnPop {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}

.turn-player-name {
  font-family: var(--font-title);
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--color-primary);
  margin: 16px 0;
}

.turn-message {
  font-size: 1rem;
  color: #888;
}

.countdown {
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-accent);
  margin-top: 16px;
}

/* ===== EVENT MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }

.modal-card {
  background: var(--color-card);
  border-radius: 20px;
  padding: 36px 40px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  animation: modalSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: translateY(60px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-icon { font-size: 3rem; margin-bottom: 12px; }
.modal-title { font-family: var(--font-title); font-size: 1.4rem; font-weight: 700; color: var(--color-primary); margin-bottom: 10px; }
.modal-desc { font-size: 0.95rem; color: #555; line-height: 1.7; margin-bottom: 20px; }

.effects-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.effect-tag {
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 0.8rem;
  font-weight: 600;
}
.effect-pos { background: #e8f5e9; color: var(--color-success); }
.effect-neg { background: #fce4ec; color: var(--color-danger); }

.choices-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 12px;
}

.btn-choice {
  padding: 12px 20px;
  font-size: 0.95rem;
  font-weight: 600;
  border: 2px solid var(--color-primary);
  border-radius: 12px;
  background: white;
  color: var(--color-primary);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--font-body);
}
.btn-choice:hover { background: var(--color-primary); color: white; }

/* ===== CONFETTI ===== */
.confetti-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2000;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  top: -20px;
  animation: confettiFall 3s linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ===== RESULT SCREEN ===== */
.result-card {
  background: var(--color-card);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 8px 40px rgba(26,58,107,0.08);
  max-width: 600px;
  width: 100%;
}

.ranking-list {
  list-style: none;
  margin: 24px 0;
}
.ranking-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #f8f8f8;
  transition: all 0.3s ease;
}
.ranking-item:first-child { background: #fff8e8; border: 2px solid var(--color-accent); }
.rank-num {
  font-family: var(--font-title);
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--color-primary);
  min-width: 36px;
}
.ranking-item:first-child .rank-num { color: var(--color-accent); }
.rank-name { font-weight: 700; flex: 1; }
.rank-score { font-size: 1.2rem; font-weight: 700; color: var(--color-primary); }
.rank-grade {
  font-family: var(--font-title);
  font-size: 1.1rem;
  font-weight: 900;
  padding: 2px 10px;
  border-radius: 8px;
}
.grade-S { background: #fff3e0; color: #e65100; }
.grade-A { background: #fce4ec; color: #c62828; }
.grade-B { background: #e3f2fd; color: #1565c0; }
.grade-C { background: #f5f5f5; color: #616161; }

/* ===== ENDING SCREEN ===== */
.ending-card {
  background: var(--color-card);
  border-radius: 20px;
  padding: 48px;
  box-shadow: 0 8px 40px rgba(26,58,107,0.08);
  max-width: 600px;
  width: 100%;
  text-align: center;
}
.ending-icon { font-size: 4rem; margin-bottom: 12px; }
.ending-title { font-family: var(--font-title); font-size: 2rem; font-weight: 900; color: var(--color-primary); margin-bottom: 20px; }
.ending-text {
  font-size: 1rem;
  color: #555;
  line-height: 2;
  margin-bottom: 32px;
  min-height: 120px;
  white-space: pre-line;
}

/* ===== PLAYER COLORS ===== */
.p-color-1 { background: #1a3a6b; }
.p-color-2 { background: #c62828; }
.p-color-3 { background: #2e7d32; }
.p-color-4 { background: #6a1b9a; }
.p-border-1 { border-left-color: #1a3a6b !important; }
.p-border-2 { border-left-color: #c62828 !important; }
.p-border-3 { border-left-color: #2e7d32 !important; }
.p-border-4 { border-left-color: #6a1b9a !important; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .card { padding: 32px 24px; }
  .title-xl { font-size: 2rem; }
  .char-grid { grid-template-columns: repeat(2, 1fr); }
  .game-header { gap: 8px; }
  .player-stat-card { min-width: 140px; padding: 10px 12px; }
  .board-grid { gap: 4px; }
  .cell { font-size: 0.55rem; }
  .cell-icon { font-size: 1.1rem; }
}
</style>
</head>
<body>

<!-- SCREEN 1: TITLE -->
<div id="title-screen" class="screen active">
  <div class="card">
    <div class="title-logo">AODAISHO</div>
    <h1 class="title-xl">人生ゲーム</h1>
    <p class="subtitle">〜 会社の歴史を体験しよう 〜</p>
    <button class="btn btn-primary" onclick="showScreen('count-screen')">🎮 ゲームスタート</button>
  </div>
</div>

<!-- SCREEN 2: PLAYER COUNT -->
<div id="count-screen" class="screen">
  <div class="card">
    <h2 class="title-lg">何人でプレイしますか？</h2>
    <div class="count-grid">
      <button class="count-btn" onclick="selectCount(1)">1</button>
      <button class="count-btn" onclick="selectCount(2)">2</button>
      <button class="count-btn" onclick="selectCount(3)">3</button>
      <button class="count-btn" onclick="selectCount(4)">4</button>
    </div>
    <button class="btn btn-primary" id="btn-to-setup" onclick="startSetup()" disabled>次へ →</button>
  </div>
</div>

<!-- SCREEN 3: PLAYER SETUP -->
<div id="setup-screen" class="screen">
  <div class="setup-card" id="setup-card"></div>
</div>

<!-- SCREEN 4: MAIN GAME -->
<div id="game-screen" class="screen">
  <div class="game-header" id="game-header"></div>
  <div class="board-wrapper">
    <div class="board-grid" id="board-grid"></div>
  </div>
  <div class="game-footer">
    <div class="turn-indicator" id="turn-indicator">-</div>
    <div class="roulette-container">
      <div class="roulette-wheel" id="roulette-wheel">?</div>
      <button class="btn-roll" id="btn-roll" onclick="spinRoulette()">🎲 ルーレット</button>
    </div>
  </div>
</div>

<!-- SCREEN 5: TURN TRANSITION -->
<div id="turn-screen" class="screen">
  <div class="card">
    <div style="font-size:3rem;" id="turn-icon">🎯</div>
    <div class="turn-player-name" id="turn-player-name">-</div>
    <div class="turn-message">タブレットを渡してね 📱</div>
    <div class="countdown" id="turn-countdown">3</div>
  </div>
</div>

<!-- SCREEN 6: RESULTS -->
<div id="result-screen" class="screen">
  <div class="result-card">
    <h2 class="title-lg">📊 結果発表</h2>
    <ol class="ranking-list" id="ranking-list"></ol>
    <button class="btn btn-primary" onclick="showEnding()">エンディングへ →</button>
  </div>
</div>

<!-- SCREEN 7: ENDING -->
<div id="ending-screen" class="screen">
  <div class="ending-card">
    <div class="ending-icon" id="ending-icon">🏆</div>
    <h2 class="ending-title" id="ending-title">-</h2>
    <div class="ending-text" id="ending-text"></div>
    <button class="btn btn-primary" onclick="resetAll()">🔄 もう一度遊ぶ</button>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card" id="modal-card">
    <div class="modal-icon" id="m-icon">📢</div>
    <h3 class="modal-title" id="m-title">-</h3>
    <p class="modal-desc" id="m-desc">-</p>
    <div class="effects-row" id="m-effects"></div>
    <div id="m-choices"></div>
    <button class="btn btn-primary" id="m-ok" onclick="closeModal()">OK</button>
  </div>
</div>

<!-- CONFETTI -->
<div class="confetti-container" id="confetti-container"></div>

<script>
// ===== DATA =====
const CHARACTERS = [
  { id:'D', name:'男性D', role:'戦略家', icon:'🧠', skill:'初期モチベ +20', bonus:{motivation:20}, passive:null },
  { id:'S', name:'男性S', role:'エンジニア', icon:'💻', skill:'初期資金 +50', bonus:{money:50}, passive:null },
  { id:'G', name:'男性G', role:'期待の星', icon:'🌟', skill:'初期貢献度 +20', bonus:{contribution:20}, passive:null },
  { id:'A', name:'女性A', role:'ムードメーカー', icon:'🎉', skill:'モチベ減少半減', bonus:{}, passive:'halfMotivationLoss' },
  { id:'H', name:'女性H', role:'総務担当', icon:'📋', skill:'資金減少半減', bonus:{}, passive:'halfMoneyLoss' },
  { id:'K', name:'女性K', role:'教育担当', icon:'📚', skill:'貢献度減少半減', bonus:{}, passive:'halfContributionLoss' }
];

const PLAYER_COLORS = ['#1a3a6b','#c62828','#2e7d32','#6a1b9a'];
const PLAYER_TOKENS = ['🔵','🔴','🟢','🟣'];

// ===== GAME STATE =====
let playerCount = 0;
let players = [];
let currentPlayerIdx = 0;
let boardCells = [];
let goalRankCounter = 0;
let setupIdx = 0;
let isSpinning = false;

// ===== SCREEN =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== PLAYER COUNT =====
function selectCount(n) {
  playerCount = n;
  document.querySelectorAll('.count-btn').forEach((b,i) => b.classList.toggle('selected', i+1===n));
  document.getElementById('btn-to-setup').disabled = false;
}

function startSetup() {
  players = [];
  for (let i = 0; i < playerCount; i++) {
    players.push({ id:i+1, name:'', character:null, money:100, motivation:50, contribution:0, position:0, isFinished:false, goalRank:null });
  }
  setupIdx = 0;
  goalRankCounter = 0;
  renderSetup();
  showScreen('setup-screen');
}

// ===== SETUP =====
function renderSetup() {
  const p = players[setupIdx];
  const takenChars = players.filter((_,i) => i!==setupIdx).map(x => x.character).filter(Boolean);
  const card = document.getElementById('setup-card');
  card.innerHTML = `
    <span class="player-badge p-color-${p.id}">プレイヤー${p.id}</span>
    <h2 class="title-lg">名前を入力</h2>
    <input class="input-field" id="name-input" placeholder="名前を入力..." value="${p.name}" maxlength="8" />
    <h3 style="font-family:var(--font-title);margin-bottom:12px;color:var(--color-primary);">キャラクター選択</h3>
    <div class="char-grid">
      ${CHARACTERS.map(c => {
        const taken = takenChars.includes(c.id);
        const selected = p.character === c.id;
        return `<div class="char-card ${selected?'selected':''} ${taken?'taken':''}" onclick="pickChar('${c.id}')">
          <div class="icon">${c.icon}</div>
          <div class="name">${c.name}</div>
          <div class="role">${c.role}</div>
          <div class="skill">${c.skill}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:12px;justify-content:center;">
      ${setupIdx > 0 ? '<button class="btn btn-outline" onclick="prevSetup()">← 戻る</button>' : ''}
      <button class="btn btn-primary" id="btn-next-setup" onclick="nextSetup()">${setupIdx < playerCount-1 ? '次へ →' : 'ゲーム開始！'}</button>
    </div>
  `;
}

function pickChar(id) {
  players[setupIdx].character = id;
  renderSetup();
}

function prevSetup() {
  saveName();
  setupIdx--;
  renderSetup();
}

function nextSetup() {
  saveName();
  const p = players[setupIdx];
  if (!p.name.trim()) { p.name = `プレイヤー${p.id}`; }
  if (!p.character) { alert('キャラクターを選んでください'); return; }

  if (setupIdx < playerCount - 1) {
    setupIdx++;
    renderSetup();
  } else {
    initGame();
  }
}

function saveName() {
  const input = document.getElementById('name-input');
  if (input) players[setupIdx].name = input.value;
}

// ===== GAME INIT =====
function initGame() {
  // Apply character bonuses
  players.forEach(p => {
    const ch = CHARACTERS.find(c => c.id === p.character);
    if (ch.bonus.money) p.money += ch.bonus.money;
    if (ch.bonus.motivation) p.motivation += ch.bonus.motivation;
    if (ch.bonus.contribution) p.contribution += ch.bonus.contribution;
  });

  generateBoard();
  currentPlayerIdx = 0;
  renderGame();
  showScreen('game-screen');
}

function generateBoard() {
  boardCells = [];
  boardCells.push({ type:'start', label:'スタート', icon:'🚀' });
  const slots = 23;
  const evCount = Math.min(EVENTS.length, 20);
  const step = slots / evCount;
  const eventPositions = [];
  for (let i = 0; i < evCount; i++) eventPositions.push(Math.round(1 + i * step));

  let eIdx = 0;
  for (let i = 1; i <= slots; i++) {
    if (eventPositions.includes(i) && eIdx < EVENTS.length) {
      const ev = EVENTS[eIdx];
      boardCells.push({ type:ev.type, label:ev.title.slice(0,5), icon:getIcon(ev.type), eventIndex:eIdx });
      eIdx++;
    } else {
      boardCells.push({ type:'rest', label:'休憩', icon:'☕' });
    }
  }
  boardCells.push({ type:'goal', label:'ゴール', icon:'🏁' });
}

function getIcon(t) {
  return {history:'📜',choice:'🤔',bonus:'🎁',crisis:'⚠️',celebration:'🎊',credo:'📖'}[t]||'📌';
}

// ===== RENDER GAME =====
function renderGame() {
  renderHeader();
  renderBoard();
  renderFooter();
}

function renderHeader() {
  const hdr = document.getElementById('game-header');
  hdr.innerHTML = players.map(p => {
    const isActive = p.id === players[currentPlayerIdx].id && !p.isFinished;
    const ch = CHARACTERS.find(c => c.id === p.character);
    return `<div class="player-stat-card ${isActive?'active-turn p-border-'+p.id:''} ${p.isFinished?'finished':''}">
      <div class="psc-name">${ch.icon} ${p.name}</div>
      <div class="psc-stats">
        <div class="psc-stat psc-stat-money"><span class="psc-stat-label">💰資金</span><span class="psc-stat-value">${p.money}</span></div>
        <div class="psc-stat psc-stat-moti"><span class="psc-stat-label">🔥モチベ</span><span class="psc-stat-value">${p.motivation}</span></div>
        <div class="psc-stat psc-stat-cont"><span class="psc-stat-label">⭐貢献</span><span class="psc-stat-value">${p.contribution}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderBoard() {
  const grid = document.getElementById('board-grid');
  const ordered = [];
  for (let row = 0; row < 5; row++) {
    const rowCells = [];
    for (let col = 0; col < 5; col++) {
      const idx = row * 5 + col;
      if (idx < boardCells.length) rowCells.push(idx);
    }
    if (row % 2 === 1) rowCells.reverse();
    ordered.push(...rowCells);
  }

  grid.innerHTML = ordered.map(ci => {
    const cell = boardCells[ci];
    if (!cell) return '<div class="cell"></div>';
    const tokens = players.filter(p => p.position === ci).map((p,i) => `<span class="token">${PLAYER_TOKENS[p.id-1]}</span>`).join('');
    return `<div class="cell ${cell.type}">
      <span class="cell-num">${ci}</span>
      <span class="cell-icon">${cell.icon}</span>
      <span class="cell-label">${cell.label}</span>
      ${tokens ? `<span class="cell-tokens">${tokens}</span>` : ''}
    </div>`;
  }).join('');
}

function renderFooter() {
  const p = players[currentPlayerIdx];
  const ch = CHARACTERS.find(c => c.id === p.character);
  document.getElementById('turn-indicator').innerHTML = `${ch.icon} <strong>${p.name}</strong> のターン`;
}

// ===== ROULETTE =====
function spinRoulette() {
  if (isSpinning) return;
  const p = players[currentPlayerIdx];
  if (p.isFinished) { nextTurn(); return; }

  isSpinning = true;
  const wheel = document.getElementById('roulette-wheel');
  const btn = document.getElementById('btn-roll');
  btn.disabled = true;
  wheel.classList.add('spinning');

  let count = 0;
  const interval = setInterval(() => {
    wheel.textContent = Math.floor(Math.random() * 6) + 1;
    count++;
    if (count >= 18) {
      clearInterval(interval);
      const result = Math.floor(Math.random() * 6) + 1;
      wheel.textContent = result;
      wheel.classList.remove('spinning');
      movePlayer(result);
    }
  }, 80);
}

function movePlayer(steps) {
  const p = players[currentPlayerIdx];
  const target = Math.min(p.position + steps, 24);
  let cur = p.position;

  const interval = setInterval(() => {
    cur++;
    if (cur > target) cur = target;
    p.position = cur;
    renderBoard();

    if (cur >= target) {
      clearInterval(interval);
      setTimeout(() => checkLanding(), 300);
    }
  }, 250);
}

function checkLanding() {
  const p = players[currentPlayerIdx];

  if (p.position >= 24) {
    goalRankCounter++;
    p.isFinished = true;
    p.goalRank = goalRankCounter;
    showGoalModal(p);
    return;
  }

  const cell = boardCells[p.position];
  if (cell && cell.eventIndex !== undefined) {
    showEventModal(EVENTS[cell.eventIndex]);
  } else if (cell && cell.type === 'rest') {
    p.motivation = Math.min(100, p.motivation + 5);
    renderGame();
    showRestModal();
  } else {
    finishTurn();
  }
}

function showGoalModal(p) {
  const bonus = (5 - p.goalRank) * 20;
  p.contribution += bonus;
  fireConfetti();
  openModal('🏁', 'ゴール！', `${p.name}さんが${p.goalRank}位でゴール！\nゴール順位ボーナス: 会社貢献度 +${bonus}`, [{label:`⭐ +${bonus}`, positive:true}], null, () => {
    renderGame();
    checkGameEnd();
  });
}

function showRestModal() {
  openModal('☕', '休憩タイム', 'ちょっと一息。モチベーションが少し回復した！', [{label:'🔥 +5', positive:true}], null, finishTurn);
}

function showEventModal(event) {
  const icons = {history:'📜',choice:'🤔',bonus:'🎁',crisis:'⚠️',celebration:'🎊',credo:'📖'};
  if (event.type === 'choice') {
    openModal(icons[event.type], event.title, event.description, [], event.choices, null);
  } else {
    applyEffects(event.effects);
    renderGame();
    const tags = effectTags(event.effects);
    if (event.type === 'bonus' || event.type === 'celebration') fireConfetti();
    openModal(icons[event.type], event.title, event.description, tags, null, finishTurn);
  }
}

// ===== MODAL =====
function openModal(icon, title, desc, tags, choices, onClose) {
  document.getElementById('m-icon').textContent = icon;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-desc').textContent = desc;
  document.getElementById('m-effects').innerHTML = tags ? tags.map(t => `<span class="effect-tag ${t.positive?'effect-pos':'effect-neg'}">${t.label}</span>`).join('') : '';

  const choicesDiv = document.getElementById('m-choices');
  const okBtn = document.getElementById('m-ok');

  if (choices) {
    okBtn.style.display = 'none';
    choicesDiv.innerHTML = `<div class="choices-col">${choices.map((c,i) => `<button class="btn-choice" onclick="makeChoice(${i})">${c.text}</button>`).join('')}</div>`;
  } else {
    okBtn.style.display = 'inline-block';
    choicesDiv.innerHTML = '';
  }

  window._modalOnClose = onClose;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  if (window._modalOnClose) { window._modalOnClose(); window._modalOnClose = null; }
}

function makeChoice(idx) {
  const p = players[currentPlayerIdx];
  const cell = boardCells[p.position];
  const event = EVENTS[cell.eventIndex];
  const choice = event.choices[idx];

  applyEffects(choice.effects);
  renderGame();

  const tags = effectTags(choice.effects);
  document.getElementById('m-effects').innerHTML = tags.map(t => `<span class="effect-tag ${t.positive?'effect-pos':'effect-neg'}">${t.label}</span>`).join('');
  document.getElementById('m-choices').innerHTML = '';
  document.getElementById('m-ok').style.display = 'inline-block';
  window._modalOnClose = finishTurn;
}

function effectTags(eff) {
  const tags = [];
  if (eff.money) tags.push({label:`💰 ${eff.money>0?'+':''}${eff.money}`, positive:eff.money>0});
  if (eff.motivation) tags.push({label:`🔥 ${eff.motivation>0?'+':''}${eff.motivation}`, positive:eff.motivation>0});
  if (eff.contribution) tags.push({label:`⭐ ${eff.contribution>0?'+':''}${eff.contribution}`, positive:eff.contribution>0});
  return tags;
}

function applyEffects(eff) {
  const p = players[currentPlayerIdx];
  const ch = CHARACTERS.find(c => c.id === p.character);
  let dm = eff.money||0, dmo = eff.motivation||0, dc = eff.contribution||0;

  if (ch.passive === 'halfMoneyLoss' && dm < 0) dm = Math.ceil(dm/2);
  if (ch.passive === 'halfMotivationLoss' && dmo < 0) dmo = Math.ceil(dmo/2);
  if (ch.passive === 'halfContributionLoss' && dc < 0) dc = Math.ceil(dc/2);

  p.money += dm;
  p.motivation = Math.max(0, Math.min(100, p.motivation + dmo));
  p.contribution += dc;
}

// ===== TURN =====
function finishTurn() {
  isSpinning = false;
  document.getElementById('btn-roll').disabled = false;

  if (checkGameEnd()) return;
  advanceTurn();
}

function advanceTurn() {
  let next = (currentPlayerIdx + 1) % players.length;
  let loops = 0;
  while (players[next].isFinished && loops < players.length) {
    next = (next + 1) % players.length;
    loops++;
  }

  if (loops >= players.length) { showResults(); return; }

  currentPlayerIdx = next;

  if (playerCount > 1) {
    showTurnTransition();
  } else {
    renderGame();
  }
}

function showTurnTransition() {
  const p = players[currentPlayerIdx];
  const ch = CHARACTERS.find(c => c.id === p.character);
  document.getElementById('turn-icon').textContent = ch.icon;
  document.getElementById('turn-player-name').textContent = `${p.name} さんのターン！`;
  showScreen('turn-screen');

  let sec = 3;
  const cd = document.getElementById('turn-countdown');
  cd.textContent = sec;
  const iv = setInterval(() => {
    sec--;
    cd.textContent = sec;
    if (sec <= 0) {
      clearInterval(iv);
      renderGame();
      showScreen('game-screen');
    }
  }, 1000);
}

function checkGameEnd() {
  if (players.every(p => p.isFinished)) {
    setTimeout(showResults, 500);
    return true;
  }
  return false;
}

// ===== RESULTS =====
function showResults() {
  const sorted = [...players].sort((a, b) => {
    const sa = a.money + a.motivation + a.contribution + (a.goalRank ? (5-a.goalRank)*20 : 0);
    const sb = b.money + b.motivation + b.contribution + (b.goalRank ? (5-b.goalRank)*20 : 0);
    return sb - sa;
  });

  const list = document.getElementById('ranking-list');
  list.innerHTML = sorted.map((p, i) => {
    const score = p.money + p.motivation + p.contribution + (p.goalRank ? (5-p.goalRank)*20 : 0);
    const grade = score >= 350 ? 'S' : score >= 250 ? 'A' : score >= 150 ? 'B' : 'C';
    const ch = CHARACTERS.find(c => c.id === p.character);
    return `<li class="ranking-item">
      <span class="rank-num">${i+1}位</span>
      <span class="rank-name">${ch.icon} ${p.name}</span>
      <span class="rank-score">${score}pt</span>
      <span class="rank-grade grade-${grade}">${grade}</span>
    </li>`;
  }).join('');

  showScreen('result-screen');
}

  }

  document.getElementById('ending-icon').textContent = icon;
  document.getElementById('ending-title').textContent = title;

  // Typewriter effect
  const textEl = document.getElementById('ending-text');
  textEl.textContent = '';
  let charIdx = 0;
  const typeInterval = setInterval(() => {
    if (charIdx < message.length) {
      textEl.textContent += message[charIdx];
      charIdx++;
    } else {
      clearInterval(typeInterval);
    }
  }, 40);

  showScreen('ending-screen');
}

// ===== CONFETTI =====
function fireConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#e8a020','#1a3a6b','#2e7d32','#c62828','#6a1b9a','#ff6f00','#00acc1'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDelay = Math.random() * 1 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.width = (6 + Math.random()*8) + 'px';
    piece.style.height = (6 + Math.random()*8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

// ===== RESET =====
function resetAll() {
  players = [];
  playerCount = 0;
  currentPlayerIdx = 0;
  goalRankCounter = 0;
  isSpinning = false;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-to-setup').disabled = true;
  document.getElementById('roulette-wheel').textContent = '?';
  showScreen('title-screen');
}
</script>
