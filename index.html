<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>人生ゲーム AODAISHO.ver</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--neon-blue:#00f5ff;--cyber-purple:#b967db;--matrix-green:#39ff14;--sunset-orange:#ff6b35;--dark-bg:#0a0a1a;--card-bg:rgba(15,15,40,0.92);--font-title:'Noto Serif JP',serif;--font-body:'Noto Sans JP',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--dark-bg);color:#fff;overflow:hidden;width:100vw;height:100vh}
.screen{display:none;width:100%;height:100%;position:fixed;top:0;left:0;z-index:10}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 10px var(--neon-blue),0 0 30px var(--neon-blue)}50%{text-shadow:0 0 20px var(--neon-blue),0 0 60px var(--neon-blue),0 0 80px var(--cyber-purple)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes neonFlicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:.4}}
@keyframes hellPulse{0%,100%{box-shadow:0 0 8px #ff0000,inset 0 0 8px rgba(255,0,0,.3)}50%{box-shadow:0 0 20px #ff0000,inset 0 0 15px rgba(255,0,0,.5)}}

#title-screen{background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 100%);text-align:center;animation:fadeIn 1s ease}
.title-logo{font-family:var(--font-title);font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,var(--neon-blue),var(--cyber-purple),var(--matrix-green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glowPulse 3s ease infinite;margin-bottom:8px}
.title-sub{font-size:1.6rem;color:var(--neon-blue);font-weight:700;letter-spacing:4px;margin-bottom:4px}
.title-edition{font-size:.9rem;color:var(--cyber-purple);letter-spacing:6px;margin-bottom:40px;animation:neonFlicker 4s ease infinite}
.neon-btn{background:transparent;border:2px solid var(--neon-blue);color:var(--neon-blue);font-size:1.2rem;font-weight:700;padding:14px 44px;border-radius:50px;cursor:pointer;font-family:var(--font-body);transition:all .3s;text-shadow:0 0 10px var(--neon-blue);box-shadow:0 0 15px rgba(0,245,255,.3),inset 0 0 15px rgba(0,245,255,.1)}
.neon-btn:hover{background:rgba(0,245,255,.15);box-shadow:0 0 30px rgba(0,245,255,.5);transform:scale(1.05)}
.neon-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#count-screen{background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 100%)}
.screen h2{font-family:var(--font-title);font-size:1.8rem;color:var(--neon-blue);margin-bottom:24px;text-shadow:0 0 20px rgba(0,245,255,.5)}
.count-btns{display:flex;gap:14px;margin-bottom:24px}
.count-btn{width:64px;height:64px;border-radius:50%;border:2px solid var(--cyber-purple);background:rgba(185,103,219,.1);color:var(--cyber-purple);font-size:1.6rem;font-weight:900;cursor:pointer;transition:all .3s}
.count-btn.selected{background:var(--cyber-purple);color:#fff;box-shadow:0 0 25px rgba(185,103,219,.6);transform:scale(1.15)}

/* CHARACTER SELECT */
#char-screen{background:radial-gradient(ellipse at center,#0f0f2a 0%,#0a0a1a 100%)}
.char-header{position:absolute;top:16px;left:0;right:0;text-align:center;z-index:5}
.char-header h2{font-size:1.3rem;color:var(--neon-blue);margin-bottom:4px}
.char-player-label{font-size:1rem;color:var(--cyber-purple);font-weight:700}
.char-selected-list{display:flex;gap:6px;justify-content:center;margin-top:6px}
.char-selected-badge{padding:3px 8px;border-radius:8px;font-size:.6rem;font-weight:700;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15)}
.char-nav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(0,245,255,.08);border:2px solid rgba(0,245,255,.3);color:var(--neon-blue);font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:5}
.char-nav:hover{background:rgba(0,245,255,.2);transform:translateY(-50%) scale(1.1)}
.char-nav.left{left:12px}
.char-nav.right{right:12px}
#char-carousel{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:10px;z-index:4}
.char-info-panel{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 24px;background:linear-gradient(to top,rgba(5,5,15,.98) 0%,rgba(5,5,15,.85) 60%,transparent 100%);z-index:5;text-align:center}
.ci-name{font-family:var(--font-title);font-size:1.6rem;font-weight:900;margin-bottom:2px}
.ci-role{font-size:.8rem;color:rgba(255,255,255,.6);margin-bottom:8px}
.char-skill-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;margin-bottom:12px;text-align:left}
.sk-name{font-size:.85rem;font-weight:700;color:var(--matrix-green);margin-bottom:2px}
.sk-desc{font-size:.72rem;color:rgba(255,255,255,.7);line-height:1.4}
.char-stats{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.char-stat{text-align:center}
.char-stat .sv{font-size:1rem;font-weight:900}
.char-stat .sl{font-size:.5rem;color:rgba(255,255,255,.5)}
.char-select-btn{width:100%;max-width:300px;padding:12px;border:none;border-radius:22px;font-size:1rem;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.char-select-btn:hover{transform:scale(1.03);filter:brightness(1.2)}

/* GAME BOARD */
#game-screen{background:var(--dark-bg);display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:10}
#game-screen.active{display:block}
#board-container{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:min(90vw,500px);padding:10px}
.tile{position:relative;aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;transition:all .3s;cursor:default;border:2px solid rgba(255,255,255,.1)}
.tile .tile-icon{font-size:1.4rem;margin-bottom:2px}
.tile .tile-label{font-size:.5rem;opacity:.7;letter-spacing:1px}
.tile-bonus{background:linear-gradient(135deg,#0d47a1,#1565c0);border-color:rgba(33,150,243,.4);box-shadow:0 0 12px rgba(33,150,243,.3)}
.tile-pinch{background:linear-gradient(135deg,#b71c1c,#c62828);border-color:rgba(244,67,54,.4);box-shadow:0 0 12px rgba(244,67,54,.3)}
.tile-hell{background:linear-gradient(135deg,#0a0a0a,#1a0000);border-color:rgba(255,0,0,.6);animation:hellPulse 2s ease infinite}
.tile-hell .tile-icon{color:#ff0000;text-shadow:0 0 10px #ff0000,0 0 20px #ff0000}
.tile-fate{background:linear-gradient(135deg,#e65100,#f57f17);border-color:rgba(255,202,40,.4);box-shadow:0 0 8px rgba(255,202,40,.2)}
.tile-history{background:linear-gradient(135deg,#4a148c,#6a1b9a);border-color:rgba(185,103,219,.4);box-shadow:0 0 8px rgba(185,103,219,.2)}
.tile-battle{background:linear-gradient(135deg,#e65100,#ff6d00);border-color:rgba(255,171,64,.4);box-shadow:0 0 8px rgba(255,171,64,.2)}
.tile-boss{background:linear-gradient(135deg,#f57f17,#ffd600);border-color:rgba(255,215,0,.5);box-shadow:0 0 12px rgba(255,215,0,.3)}
.tile-start{background:linear-gradient(135deg,#1b5e20,#388e3c);border-color:rgba(76,175,80,.4)}
.tile-goal{background:linear-gradient(135deg,#e65100,#ff6d00);border-color:rgba(255,167,38,.5);box-shadow:0 0 15px rgba(255,167,38,.3)}
.tile.current{transform:scale(1.08);z-index:2}
.token{position:absolute;width:20px;height:20px;border-radius:50%;border:2px solid #fff;font-size:.5rem;display:flex;align-items:center;justify-content:center;font-weight:900;z-index:3;transition:all .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 8px rgba(0,0,0,.5)}

/* HUD */
.hud-top{position:fixed;top:8px;left:8px;right:8px;display:flex;gap:5px;flex-wrap:wrap;z-index:20}
.hud-card{flex:1;min-width:110px;background:var(--card-bg);backdrop-filter:blur(8px);border-radius:10px;padding:6px 10px;border:1px solid rgba(255,255,255,.1);transition:all .3s}
.hud-card.active-turn{border-color:var(--neon-blue);box-shadow:0 0 10px rgba(0,245,255,.3)}
.hc-name{font-weight:700;font-size:.7rem;margin-bottom:1px}
.hc-stats{font-size:.6rem;color:rgba(255,255,255,.7)}
.hc-item{font-size:.55rem;color:var(--cyber-purple);margin-top:1px}
.hud-bottom{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:var(--card-bg);backdrop-filter:blur(8px);border-radius:24px;padding:8px 20px;border:1px solid rgba(255,255,255,.1);z-index:20}
.hud-turn-label{font-family:var(--font-title);font-size:.8rem;color:var(--neon-blue)}
.dice-display{font-size:2rem;font-weight:900;min-width:40px;text-align:center;color:var(--matrix-green);text-shadow:0 0 10px var(--matrix-green)}
.roll-btn{background:linear-gradient(135deg,var(--sunset-orange),#ff3d00);color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:var(--font-body);transition:all .2s;box-shadow:0 3px 10px rgba(255,107,53,.4)}
.roll-btn:hover:not(:disabled){transform:scale(1.05)}
.roll-btn:disabled{opacity:.4;cursor:not-allowed}
.item-btn{background:linear-gradient(135deg,var(--cyber-purple),#8e24aa);color:#fff;border:none;padding:7px 14px;border-radius:16px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s}
.item-btn:disabled{opacity:.35;cursor:not-allowed}

/* EVENT OVERLAY */
.event-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:16px}
.event-overlay.show{display:flex}
.event-card{background:var(--card-bg);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:30px 24px;max-width:440px;width:100%;text-align:center;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 16px 50px rgba(0,0,0,.5)}
.ev-emoji{font-size:60px;margin-bottom:12px;animation:float 2s ease infinite}
.ev-title{font-family:var(--font-title);font-size:1.3rem;font-weight:900;margin-bottom:8px;color:var(--neon-blue)}
.ev-desc{font-size:.85rem;line-height:1.6;color:rgba(255,255,255,.8);margin-bottom:14px}
.ev-effects{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.ev-badge{padding:4px 10px;border-radius:14px;font-weight:700;font-size:.75rem}
.ev-badge.pos{background:rgba(57,255,20,.1);color:var(--matrix-green);border:1px solid rgba(57,255,20,.2)}
.ev-badge.neg{background:rgba(255,107,53,.1);color:var(--sunset-orange);border:1px solid rgba(255,107,53,.2)}
.ev-close-btn{background:linear-gradient(135deg,var(--neon-blue),var(--cyber-purple));color:#fff;border:none;padding:10px 32px;border-radius:20px;font-size:.9rem;font-weight:700;cursor:pointer}

/* MINIGAME */
.minigame-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:110;align-items:center;justify-content:center;padding:16px}
.minigame-overlay.show{display:flex}
.mg-card{background:var(--card-bg);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:30px;max-width:440px;width:100%;text-align:center;animation:slideUp .4s ease}
.mg-card h3{font-family:var(--font-title);font-size:1.2rem;color:var(--neon-blue);margin-bottom:8px}
.mg-card p{color:rgba(255,255,255,.7);margin-bottom:12px;font-size:.85rem}
.tap-area{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,var(--sunset-orange),#ff3d00);color:#fff;font-size:2.5rem;display:flex;align-items:center;justify-content:center;margin:12px auto;cursor:pointer;user-select:none;transition:transform .08s;box-shadow:0 0 20px rgba(255,107,53,.4)}
.tap-area:active{transform:scale(.88)}
.tap-counter{font-size:1.6rem;font-weight:900;color:var(--matrix-green);margin:6px 0}
.tap-timer{font-size:.9rem;color:rgba(255,255,255,.6)}
.janken-choices{display:flex;gap:12px;justify-content:center;margin:16px 0}
.janken-btn{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);font-size:2rem;cursor:pointer;transition:all .2s}
.janken-btn:hover{transform:scale(1.15);border-color:var(--neon-blue)}
.slot-machine{display:flex;gap:8px;justify-content:center;margin:16px 0}
.slot-reel{width:60px;height:75px;border:2px solid var(--cyber-purple);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;background:rgba(185,103,219,.06)}
.slot-reel.stopped{border-color:var(--matrix-green);box-shadow:0 0 10px rgba(57,255,20,.3)}
.slot-stop-btn{background:linear-gradient(135deg,var(--cyber-purple),#6a1b9a);color:#fff;border:none;padding:9px 22px;border-radius:20px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:12px}

.turn-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,26,.95);z-index:90;align-items:center;justify-content:center;flex-direction:column}
.turn-overlay.show{display:flex}
.turn-overlay h2{font-family:var(--font-title);font-size:2.2rem;margin-bottom:12px;animation:popIn .5s ease}
.turn-overlay .countdown{font-size:4rem;font-weight:900;color:var(--neon-blue);text-shadow:0 0 25px var(--neon-blue)}

#ending-screen{background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 100%)}
#ending-screen h1{font-family:var(--font-title);font-size:2.2rem;background:linear-gradient(135deg,var(--neon-blue),var(--cyber-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}
.ranking-list{list-style:none;width:100%;max-width:460px}
.ranking-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:slideUp .5s ease}
.ranking-item:first-child{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.06)}
.rank{font-size:1.6rem}
.r-name{font-size:.95rem;font-weight:700;flex:1}
.r-score{font-size:.75rem;color:rgba(255,255,255,.6)}
.confetti-piece{position:fixed;width:8px;height:8px;top:-10px;z-index:200;animation:confettiFall 3s linear forwards;pointer-events:none}
.shaking{animation:shake .4s ease}
@media(max-width:600px){.title-logo{font-size:2.4rem}.hud-card{min-width:80px;padding:5px 7px}.tile{border-radius:10px}.tile .tile-icon{font-size:1.1rem}}
</style>
</head>
<body>

<div id="title-screen" class="screen active">
  <div class="title-logo">人生ゲーム</div>
  <div class="title-sub">AODAISHO.ver</div>
  <div class="title-edition">-- BOARD GAME --</div>
  <button class="neon-btn" onclick="showScreen('count-screen')">GAME START</button>
</div>

<div id="count-screen" class="screen">
  <h2>何人でプレイする？</h2>
  <div class="count-btns"><button class="count-btn" onclick="selectCount(1)">1</button><button class="count-btn" onclick="selectCount(2)">2</button><button class="count-btn" onclick="selectCount(3)">3</button><button class="count-btn" onclick="selectCount(4)">4</button></div>
  <button class="neon-btn" id="count-next-btn" disabled onclick="goToCharSelect()">NEXT</button>
</div>

<div id="char-screen" class="screen">
  <div class="char-header"><h2>キャラクター選択</h2><div class="char-player-label" id="char-plabel">P1</div><div class="char-selected-list" id="char-slist"></div></div>
  <button class="char-nav left" onclick="rotateChars(-1)">&larr;</button>
  <button class="char-nav right" onclick="rotateChars(1)">&rarr;</button>
  <div id="char-carousel"></div>
  <div class="char-info-panel" id="char-panel">
    <div class="ci-name" id="ci-name"></div>
    <div class="ci-role" id="ci-role"></div>
    <div class="char-skill-box"><div class="sk-name" id="ci-skname"></div><div class="sk-desc" id="ci-skdesc"></div></div>
    <div class="char-stats" id="ci-stats"></div>
    <button class="char-select-btn" id="ci-btn" onclick="confirmChar()">決定</button>
  </div>
</div>

<div id="game-screen">
  <div class="hud-top" id="hud-top"></div>
  <div id="board-container"></div>
  <div class="hud-bottom"><span class="hud-turn-label" id="hud-turn">Turn 1</span><span class="dice-display" id="dice-disp">?</span><button class="roll-btn" id="roll-btn" onclick="rollDice()">ROLL</button><button class="item-btn" id="item-btn" disabled onclick="useItem()">ITEM</button></div>
</div>

<div id="ending-screen" class="screen">
  <h1>RESULT</h1>
  <ul class="ranking-list" id="ranking-list"></ul>
  <button class="neon-btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

<div class="event-overlay" id="event-overlay"><div class="event-card"><div class="ev-emoji" id="ev-emoji"></div><div class="ev-title" id="ev-title"></div><div class="ev-desc" id="ev-desc"></div><div class="ev-effects" id="ev-effects"></div><button class="ev-close-btn" onclick="closeEvent()">OK</button></div></div>
<div class="minigame-overlay" id="mg-overlay"><div class="mg-card" id="mg-card"></div></div>
<div class="turn-overlay" id="turn-overlay"><h2 id="turn-text"></h2><div class="countdown" id="turn-cd"></div></div>

<script>
// ===== CHARACTERS =====
const CHARS=[
  {id:'D',name:'男性D',role:'戦略コンサルタント',color:'#1a237e',look:'ネイビースーツ+眼鏡',skill:'戦略的予見',skillDesc:'選択イベントの結果を事前確認。情報を制する者がゲームを制す。',stats:{atk:3,def:4,lck:2,chr:4},effect:'formula'},
  {id:'S',name:'男性S',role:'フルスタックエンジニア',color:'#1b5e20',look:'パーカー+イヤホン',skill:'トレンドキャッチャー',skillDesc:'ボーナスマスの効果が1.5倍に増幅。テクノロジーの力で利益最大化。',stats:{atk:2,def:3,lck:4,chr:3},effect:'circuit'},
  {id:'A',name:'女性A',role:'SNSマーケター',color:'#e91e63',look:'ピンクトップス+スマホ',skill:'バズり拡散',skillDesc:'ボーナス効果を全プレイヤーに波及。みんなHAPPYがモットー。',stats:{atk:2,def:2,lck:5,chr:5},effect:'hearts'},
  {id:'K',name:'女性K',role:'教育・研修担当',color:'#f57f17',look:'オレンジカーディガン',skill:'教育的指導',skillDesc:'怒りモード発動で対決マス必勝。普段は優しいが怒ると最強。',stats:{atk:5,def:2,lck:3,chr:3},effect:'duality'},
  {id:'H',name:'女性H',role:'総務・経理',color:'#546e7a',look:'グレースーツ+クリップボード',skill:'物理的解決',skillDesc:'理不尽イベントを無効化。黙ってパンチで全て解決する。',stats:{atk:4,def:5,lck:2,chr:2},effect:'punch'}
];

// ===== GLOBALS =====
let playerCount=0,players=[],currentPlayerIndex=0,isRolling=false,turnNumber=1,gameEnded=false;
let charCurrentIdx=0,charSelectingP=0;
const P_COLORS=['#ff4757','#3742fa','#2ed573','#ffa502'];
const ITEMS=[{id:'drink',name:'栄養ドリンク',emoji:'🥤'},{id:'blame',name:'責任転嫁',emoji:'📋'},{id:'meeting',name:'緊急会議',emoji:'📣'}];
const TOTAL_CELLS=25;

// ===== SCREENS =====
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('game-screen').classList.remove('active');}
function selectCount(n){playerCount=n;document.querySelectorAll('.count-btn').forEach((b,i)=>b.classList.toggle('selected',i===n-1));document.getElementById('count-next-btn').disabled=false;}

// ===== CHARACTER SELECT =====
function goToCharSelect(){
  players=[];
  for(let i=0;i<playerCount;i++)players.push({name:`P${i+1}`,pos:0,money:100,motivation:100,contribution:0,item:null,shield:false,finished:false,order:0,char:null});
  charSelectingP=0;charCurrentIdx=0;
  showScreen('char-screen');
  buildCharCarousel();updateCharPanel();
}
function getAvailChars(){return CHARS.filter(c=>!players.some(p=>p.char&&p.char.id===c.id));}
function buildCharCarousel(){
  const box=document.getElementById('char-carousel');box.innerHTML='';
  const avail=getAvailChars();
  avail.forEach((ch,i)=>{
    const c=document.createElement('canvas');c.width=160;c.height=220;
    drawChar(c.getContext('2d'),ch,160,220);
    const img=document.createElement('img');img.src=c.toDataURL();
    img.style.cssText='width:100px;height:138px;object-fit:contain;transition:all .4s cubic-bezier(.34,1.56,.64,1);border-radius:10px;cursor:pointer;opacity:0.3;transform:scale(0.6);filter:brightness(0.5);';
    img.dataset.idx=i;
    img.onclick=()=>{charCurrentIdx=i;highlightCurrent();updateCharPanel();};
    box.appendChild(img);
  });
  highlightCurrent();
}
function drawChar(ctx,ch,w,h){
  ctx.clearRect(0,0,w,h);
  ctx.shadowColor=ch.color;ctx.shadowBlur=15;
  ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(w/2,70,34,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  const hair=ch.id==='A'?'#3e1f1f':ch.id==='K'?'#2c1810':ch.id==='H'?'#1a1a1a':'#1a1a2e';
  ctx.fillStyle=hair;
  if(ch.id==='D'||ch.id==='S'){ctx.beginPath();ctx.ellipse(w/2,54,32,24,0,Math.PI,0);ctx.fill();}
  else{ctx.beginPath();ctx.ellipse(w/2,56,34,26,0,Math.PI,0);ctx.fill();ctx.fillRect(w/2-32,56,12,40);ctx.fillRect(w/2+20,56,12,40);}
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(w/2-10,67,4,0,Math.PI*2);ctx.arc(w/2+10,67,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(w/2,78,7,0.1*Math.PI,0.9*Math.PI);ctx.stroke();
  if(ch.id==='D'){ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.strokeRect(w/2-20,61,15,12);ctx.strokeRect(w/2+5,61,15,12);ctx.beginPath();ctx.moveTo(w/2-5,67);ctx.lineTo(w/2+5,67);ctx.stroke();}
  ctx.fillStyle=ch.color;ctx.beginPath();ctx.moveTo(w/2-30,108);ctx.lineTo(w/2+30,108);ctx.lineTo(w/2+34,220);ctx.lineTo(w/2-34,220);ctx.closePath();ctx.fill();
  ctx.fillStyle=ch.color;ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(ch.name,w/2,h-8);
}
function highlightCurrent(){
  const imgs=document.querySelectorAll('#char-carousel img');
  imgs.forEach((img,i)=>{
    const on=i===charCurrentIdx;
    img.style.opacity=on?'1':'0.3';
    img.style.transform=on?'scale(1.05)':'scale(0.6)';
    img.style.filter=on?'brightness(1) drop-shadow(0 0 16px rgba(0,245,255,.5))':'brightness(0.5)';
  });
}
function rotateChars(dir){const a=getAvailChars();if(!a.length)return;charCurrentIdx=(charCurrentIdx+dir+a.length)%a.length;highlightCurrent();updateCharPanel();}
function updateCharPanel(){
  const avail=getAvailChars();if(!avail.length)return;
  const ch=avail[charCurrentIdx%avail.length];
  document.getElementById('ci-name').textContent=ch.name;
  document.getElementById('ci-name').style.color=ch.color;
  document.getElementById('ci-role').textContent=ch.look+' / '+ch.role;
  document.getElementById('ci-skname').textContent=ch.skill;
  document.getElementById('ci-skdesc').textContent=ch.skillDesc;
  const labels={atk:'攻撃',def:'防御',lck:'運',chr:'魅力'};
  document.getElementById('ci-stats').innerHTML=Object.entries(ch.stats).map(([k,v])=>`<div class="char-stat"><div class="sv" style="color:${ch.color}">${'★'.repeat(v)}${'☆'.repeat(5-v)}</div><div class="sl">${labels[k]}</div></div>`).join('');
  const btn=document.getElementById('ci-btn');
  btn.style.background=`linear-gradient(135deg,${ch.color},${lighten(ch.color,40)})`;
  btn.textContent=`${ch.name} で決定！`;
  document.getElementById('char-plabel').textContent=`${players[charSelectingP].name} が選択中`;
  document.getElementById('char-plabel').style.color=P_COLORS[charSelectingP];
  document.getElementById('char-slist').innerHTML=players.filter(p=>p.char).map(p=>`<span class="char-selected-badge" style="border-color:${p.char.color};color:${p.char.color}">${p.name}:${p.char.id}</span>`).join('');
}
function confirmChar(){
  const avail=getAvailChars();
  const ch=avail[charCurrentIdx%avail.length];
  players[charSelectingP].char=ch;
  spawnConfetti();
  charSelectingP++;
  if(charSelectingP>=playerCount){setTimeout(()=>startGame(),1200);}
  else{setTimeout(()=>{charCurrentIdx=0;buildCharCarousel();updateCharPanel();},800);}
}
function lighten(hex,amt){const n=parseInt(hex.replace('#',''),16);return '#'+[16,8,0].map(s=>Math.min(255,(n>>s&0xFF)+amt).toString(16).padStart(2,'0')).join('');}

// ===== GAME BOARD (DOM) =====
function startGame(){
  currentPlayerIndex=0;turnNumber=1;gameEnded=false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('game-screen').classList.add('active');
  buildBoard();renderHUD();updateCtrl();
}
function buildBoard(){
  const container=document.getElementById('board-container');container.innerHTML='';
  for(let i=0;i<TOTAL_CELLS;i++){
    const d=boardLayout[i];
    const tile=document.createElement('div');
    tile.className=`tile tile-${d.t}`;
    tile.id=`tile-${i}`;
    tile.innerHTML=`<div class="tile-icon">${d.icon}</div><div class="tile-label">${d.label}</div>`;
    container.appendChild(tile);
  }
  // Place tokens
  players.forEach((p,i)=>{
    const tk=document.createElement('div');
    tk.className='token';tk.id=`token-${i}`;
    tk.style.background=p.char?p.char.color:P_COLORS[i];
    tk.textContent=p.char?p.char.id[0]:(i+1);
    document.getElementById('tile-0').appendChild(tk);
  });
  // Position tokens within start tile
  positionTokensOnTile(0);
}
function positionTokensOnTile(tileIdx){
  const offsets=[[-25,-25],[25,-25],[-25,25],[25,25]];
  players.forEach((p,i)=>{
    if(p.pos===tileIdx||tileIdx===undefined){
      const tk=document.getElementById(`token-${i}`);
      if(tk){
        const o=offsets[i]||[0,0];
        tk.style.top=`calc(50% + ${o[1]/2}px - 10px)`;
        tk.style.left=`calc(50% + ${o[0]/2}px - 10px)`;
      }
    }
  });
}
function moveTokenTo(pi,tileIdx){
  return new Promise(res=>{
    const tk=document.getElementById(`token-${pi}`);
    const tile=document.getElementById(`tile-${tileIdx}`);
    tile.appendChild(tk);
    const offsets=[[-20,-20],[20,-20],[-20,20],[20,20]];
    const o=offsets[pi]||[0,0];
    tk.style.top=`calc(50% + ${o[1]/2}px - 10px)`;
    tk.style.left=`calc(50% + ${o[0]/2}px - 10px)`;
    // Highlight tile
    tile.classList.add('current');
    setTimeout(()=>{tile.classList.remove('current');res();},400);
  });
}

// HUD
function renderHUD(){
  const top=document.getElementById('hud-top');top.innerHTML='';
  players.forEach((p,i)=>{
    const c=document.createElement('div');
    c.className=`hud-card${i===currentPlayerIndex&&!p.finished?' active-turn':''}`;
    const cc=p.char?p.char.color:P_COLORS[i];
    const it=p.item?ITEMS.find(x=>x.id===p.item).emoji:'-';
    c.innerHTML=`<div class="hc-name" style="color:${cc}">${p.char?p.char.id+' ':''}${p.name}</div><div class="hc-stats">💰${p.money} ❤️${p.motivation} ⭐${p.contribution}</div><div class="hc-item">🎒${it}</div>`;
    top.appendChild(c);
  });
}
function updateCtrl(){
  const p=players[currentPlayerIndex];
  document.getElementById('hud-turn').textContent=`Turn ${turnNumber} - ${p.name}`;
  document.getElementById('roll-btn').disabled=isRolling||p.finished;
  document.getElementById('dice-disp').textContent='?';
  const ib=document.getElementById('item-btn');ib.disabled=!p.item;ib.textContent=p.item?ITEMS.find(x=>x.id===p.item).emoji:'ITEM';
}

// DICE
async function rollDice(){
  if(isRolling||gameEnded)return;isRolling=true;
  document.getElementById('roll-btn').disabled=true;
  const disp=document.getElementById('dice-disp');
  let cnt=0;const spin=setInterval(()=>{disp.textContent=Math.floor(Math.random()*6)+1;cnt++;},60);
  await sleep(1500);clearInterval(spin);
  const result=Math.floor(Math.random()*6)+1;
  disp.textContent=result;
  gsap.fromTo(disp,{scale:2,opacity:0},{scale:1,opacity:1,duration:.4,ease:'back.out(2)'});
  await doMove(result);
}
async function doMove(steps){
  const p=players[currentPlayerIndex];
  const target=Math.min(p.pos+steps,TOTAL_CELLS-1);
  for(let i=p.pos+1;i<=target;i++){await moveTokenTo(currentPlayerIndex,i);p.pos=i;await sleep(200);}
  if(target>=TOTAL_CELLS-1){
    p.finished=true;p.order=players.filter(x=>x.finished).length;
    const bonus=[60,40,20,0][p.order-1]||0;
    p.contribution+=bonus;spawnConfetti();
    showEvent('🏁',`${p.name} ゴール！`,`${p.order}位！+${bonus}`,{contribution:bonus});
  }else triggerCell(target);
}

// EVENTS
function triggerCell(pos){const t=boardLayout[pos].t;switch(t){case'bonus':spawnConfetti();doBonus();break;case'pinch':shakeScr();doPinch();break;case'fate':showSlot();break;case'history':doRandom(historyEv);break;case'battle':doBattle();break;case'hell':flashHell();doHell();break;case'boss':doRandom(bossEv);break;default:endTurn();}}
function doBonus(){const p=players[currentPlayerIndex],ev=bonusEv[Math.floor(Math.random()*bonusEv.length)];let fx={...ev.fx};if(p.char&&p.char.id==='S'){fx.money=Math.round((fx.money||0)*1.5);fx.motivation=Math.round((fx.motivation||0)*1.5);fx.contribution=Math.round((fx.contribution||0)*1.5);}applyFx(fx);if(p.char&&p.char.id==='A'){players.forEach((pp,i)=>{if(i!==currentPlayerIndex&&!pp.finished){pp.money=Math.max(0,pp.money+Math.round((fx.money||0)*.5));pp.motivation=Math.max(0,pp.motivation+Math.round((fx.motivation||0)*.5));pp.contribution=Math.max(0,pp.contribution+Math.round((fx.contribution||0)*.5));}});}showEvent(ev.emoji,ev.title,ev.desc,fx);}
function doPinch(){const p=players[currentPlayerIndex];if(p.shield){p.shield=false;showEvent('🛡️','責任転嫁発動！','マイナス回避！',{});return;}doRandom(pinchEv);}
function doHell(){const p=players[currentPlayerIndex];if(p.char&&p.char.id==='H'){showEvent('👊','物理的解決！','パンチで解決。ダメージ無効化！',{});return;}if(p.shield){p.shield=false;showEvent('🛡️','責任転嫁発動！','回避！',{});return;}doRandom(hellEv);}
function doBattle(){const p=players[currentPlayerIndex];if(p.char&&p.char.id==='K'){spawnConfetti();applyFx({money:50,motivation:20,contribution:15});showEvent('🔥','教育的指導！','怒りモード発動！自動勝利！',{money:50,motivation:20,contribution:15});return;}if(playerCount<=1||players.filter((x,i)=>i!==currentPlayerIndex&&!x.finished).length===0){showTap();return;}showJanken();}
function doRandom(list){const ev=list[Math.floor(Math.random()*list.length)];applyFx(ev.fx);showEvent(ev.emoji,ev.title,ev.desc,ev.fx);}
function applyFx(fx){const p=players[currentPlayerIndex];if(fx.money)p.money=Math.max(0,p.money+fx.money);if(fx.motivation)p.motivation=Math.max(0,p.motivation+fx.motivation);if(fx.contribution)p.contribution=Math.max(0,p.contribution+fx.contribution);}

function showEvent(emoji,title,desc,fx){document.getElementById('ev-emoji').textContent=emoji;document.getElementById('ev-title').textContent=title;document.getElementById('ev-desc').textContent=desc;const ef=document.getElementById('ev-effects');ef.innerHTML='';if(fx.money)ef.innerHTML+=`<span class="ev-badge ${fx.money>0?'pos':'neg'}">💰${fx.money>0?'+':''}${fx.money}</span>`;if(fx.motivation)ef.innerHTML+=`<span class="ev-badge ${fx.motivation>0?'pos':'neg'}">❤️${fx.motivation>0?'+':''}${fx.motivation}</span>`;if(fx.contribution)ef.innerHTML+=`<span class="ev-badge ${fx.contribution>0?'pos':'neg'}">⭐${fx.contribution>0?'+':''}${fx.contribution}</span>`;document.getElementById('event-overlay').classList.add('show');renderHUD();}
function closeEvent(){document.getElementById('event-overlay').classList.remove('show');if(players.every(p=>p.finished))showEnding();else endTurn();}

// ITEMS
function useItem(){const p=players[currentPlayerIndex];if(!p.item)return;switch(p.item){case'drink':p.money+=30;p.motivation+=30;p.contribution+=30;p.item=null;showEvent('🥤','栄養ドリンク！','全+30！',{money:30,motivation:30,contribution:30});break;case'blame':p.shield=true;p.item=null;showEvent('📋','責任転嫁セット！','次マイナス無効！',{});break;case'meeting':players.forEach((pp,i)=>{if(i!==currentPlayerIndex&&!pp.finished)pp.pos=players[currentPlayerIndex].pos;});p.item=null;showEvent('📣','緊急会議！','全員召集！',{});break;}}
function maybeItem(){const p=players[currentPlayerIndex];if(!p.item&&Math.random()<.2)p.item=ITEMS[Math.floor(Math.random()*ITEMS.length)].id;}

// MINIGAMES
function showSlot(){const ov=document.getElementById('mg-overlay'),card=document.getElementById('mg-card'),sym=['🌟','😊','🙂','😐','😰','💀'];card.innerHTML=`<h3>運命のスロット</h3><p>STOPで止めろ！</p><div class="slot-machine"><div class="slot-reel" id="sr0">${sym[0]}</div><div class="slot-reel" id="sr1">${sym[0]}</div><div class="slot-reel" id="sr2">${sym[0]}</div></div><button class="slot-stop-btn" id="sbtn" onclick="stopReel()">STOP!</button>`;ov.classList.add('show');const st={stopped:[0,0,0],vals:[0,0,0],cur:0,ivs:[]};for(let i=0;i<3;i++)st.ivs[i]=setInterval(()=>{if(st.stopped[i])return;st.vals[i]=Math.floor(Math.random()*sym.length);document.getElementById(`sr${i}`).textContent=sym[st.vals[i]];},80+i*20);window._ss={...st,sym};}
function stopReel(){const s=window._ss;if(!s||s.cur>=3)return;s.stopped[s.cur]=1;clearInterval(s.ivs[s.cur]);document.getElementById(`sr${s.cur}`).classList.add('stopped');s.cur++;if(s.cur>=3){document.getElementById('sbtn').disabled=true;setTimeout(()=>{const best=Math.min(...s.vals),r=fateRes[best];applyFx(r.fx);document.getElementById('mg-overlay').classList.remove('show');if(best<=1)spawnConfetti();showEvent(r.emoji,r.title,r.desc,r.fx);},600);}}
function showTap(){const ov=document.getElementById('mg-overlay'),card=document.getElementById('mg-card'),tgt=15+Math.floor(Math.random()*10);card.innerHTML=`<h3>連打チャレンジ！</h3><p>${tgt}回！3秒以内！</p><div class="tap-area" id="ta" onclick="doTap()">👊</div><div class="tap-counter" id="tc">0/${tgt}</div><div class="tap-timer" id="tt">準備...</div>`;ov.classList.add('show');window._ts={count:0,tgt,started:false,ended:false};setTimeout(()=>{if(window._ts.ended)return;window._ts.started=true;document.getElementById('tt').textContent='3.0秒';let t=3000;const tm=setInterval(()=>{t-=100;if(t<=0||window._ts.ended){clearInterval(tm);finTap();return;}document.getElementById('tt').textContent=(t/1000).toFixed(1)+'秒';},100);},800);}
function doTap(){const s=window._ts;if(!s||!s.started||s.ended)return;s.count++;document.getElementById('tc').textContent=`${s.count}/${s.tgt}`;if(s.count>=s.tgt){s.ended=true;finTap();}}
function finTap(){const s=window._ts;if(!s)return;s.ended=true;const ok=s.count>=s.tgt;setTimeout(()=>{document.getElementById('mg-overlay').classList.remove('show');if(ok){spawnConfetti();applyFx({money:40,motivation:20,contribution:15});showEvent('🎊','連打成功！',`${s.count}回達成！`,{money:40,motivation:20,contribution:15});}else{applyFx({money:-20,motivation:-15,contribution:0});showEvent('😵','連打失敗...',`${s.count}/${s.tgt}回...`,{money:-20,motivation:-15});}},500);}
function showJanken(){const opps=players.filter((p,i)=>i!==currentPlayerIndex&&!p.finished),opp=opps[Math.floor(Math.random()*opps.length)];window._jo=opp;const ov=document.getElementById('mg-overlay'),card=document.getElementById('mg-card');card.innerHTML=`<h3>じゃんけん！</h3><p>${players[currentPlayerIndex].name} vs ${opp.name}</p><div class="janken-choices"><button class="janken-btn" onclick="doJK('r')">✊</button><button class="janken-btn" onclick="doJK('s')">✌️</button><button class="janken-btn" onclick="doJK('p')">🖐️</button></div>`;ov.classList.add('show');}
function doJK(c){const cs=['r','s','p'],oc=cs[Math.floor(Math.random()*3)];let out;if(c===oc)out='d';else if((c==='r'&&oc==='s')||(c==='s'&&oc==='p')||(c==='p'&&oc==='r'))out='w';else out='l';document.querySelectorAll('.janken-btn').forEach(b=>b.disabled=true);setTimeout(()=>{document.getElementById('mg-overlay').classList.remove('show');if(out==='w'){spawnConfetti();applyFx({money:50,motivation:20,contribution:15});showEvent('🎉','勝利！',`${window._jo.name}に勝った！`,{money:50,motivation:20,contribution:15});}else if(out==='l'){applyFx({money:-30,motivation:-15,contribution:-5});showEvent('😭','敗北...',`${window._jo.name}に負けた...`,{money:-30,motivation:-15,contribution:-5});}else{applyFx({money:10,motivation:10,contribution:5});showEvent('🤝','あいこ！','引き分け！',{money:10,motivation:10,contribution:5});}},1200);}

// VFX
function spawnConfetti(){const cls=['#ff4757','#3742fa','#2ed573','#ffa502','#b967db','#00f5ff','#39ff14'];for(let i=0;i<30;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=cls[Math.floor(Math.random()*cls.length)];p.style.width=(Math.random()*6+4)+'px';p.style.height=(Math.random()*6+4)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.animationDuration=(Math.random()*2+2)+'s';p.style.animationDelay=Math.random()*.3+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),4000);}}
function shakeScr(){document.body.classList.add('shaking');setTimeout(()=>document.body.classList.remove('shaking'),400);}
function flashHell(){document.body.style.background='#300';setTimeout(()=>{document.body.style.background='var(--dark-bg)';},300);}

// TURNS
function endTurn(){maybeItem();renderHUD();isRolling=false;let next=(currentPlayerIndex+1)%playerCount;let lp=0;while(players[next].finished&&lp<playerCount){next=(next+1)%playerCount;lp++;}if(players.every(p=>p.finished)){showEnding();return;}if(next<=currentPlayerIndex)turnNumber++;currentPlayerIndex=next;if(playerCount>1)showTurnTrans();else{updateCtrl();renderHUD();}}
function showTurnTrans(){const ov=document.getElementById('turn-overlay'),p=players[currentPlayerIndex],cc=p.char?p.char.color:P_COLORS[currentPlayerIndex];document.getElementById('turn-text').innerHTML=`<span style="color:${cc}">${p.name}</span> のターン！`;ov.classList.add('show');let c=2;document.getElementById('turn-cd').textContent=c;const tm=setInterval(()=>{c--;if(c<=0){clearInterval(tm);ov.classList.remove('show');updateCtrl();renderHUD();}else document.getElementById('turn-cd').textContent=c;},1000);}

// ENDING
function showEnding(){gameEnded=true;document.getElementById('game-screen').classList.remove('active');showScreen('ending-screen');spawnConfetti();const sorted=[...players].sort((a,b)=>(b.money+b.motivation+b.contribution)-(a.money+a.motivation+a.contribution));const medals=['🥇','🥈','🥉','4️⃣'];const list=document.getElementById('ranking-list');list.innerHTML='';sorted.forEach((p,i)=>{const total=p.money+p.motivation+p.contribution;const li=document.createElement('li');li.className='ranking-item';li.style.animationDelay=`${i*.2}s`;const cc=p.char?p.char.color:'#fff';li.innerHTML=`<span class="rank">${medals[i]}</span><span class="r-name" style="color:${cc}">${p.char?p.char.id+' ':''}${p.name}</span><span class="r-score">💰${p.money} ❤️${p.motivation} ⭐${p.contribution}=${total}pt</span>`;list.appendChild(li);});}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
// Touch swipe for char select
let _tx=0;document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{if(!document.getElementById('char-screen').classList.contains('active'))return;const d=e.changedTouches[0].clientX-_tx;if(Math.abs(d)>40)rotateChars(d>0?-1:1);});
</script>
</body>
</html>
